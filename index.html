<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教师班级课表查询系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 基础样式保持不变，只添加新样式 */
        
        /* 模式切换 */
        .mode-switcher {
            display: flex;
            background: #e8f6f3;
            border-radius: 6px;
            padding: 5px;
            margin-bottom: 15px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            background: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .mode-btn i {
            margin-right: 5px;
        }
        
        .mode-btn.teacher-mode.active {
            color: #2a9d8f;
        }
        
        .mode-btn.class-mode.active {
            color: #1a5f7a;
        }
        
        /* 班级卡片样式 */
        .class-card {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .class-card:hover {
            background: #e8f6f3;
            transform: translateX(3px);
        }
        
        .class-card.active {
            background: #1a5f7a;
            color: white;
            border-color: #1a5f7a;
        }
        
        .class-name {
            font-weight: bold;
            font-size: 1rem;
        }
        
        .class-desc {
            font-size: 0.8rem;
            color: #666;
            margin-top: 3px;
        }
        
        .class-card.active .class-desc {
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* 模式指示器 */
        .mode-indicator {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-left: 10px;
        }
        
        .mode-indicator.teacher {
            background: rgba(42, 157, 143, 0.2);
            color: #2a9d8f;
        }
        
        .mode-indicator.class {
            background: rgba(26, 95, 122, 0.2);
            color: #1a5f7a;
        }
        
        /* 课表标题样式 */
        .timetable-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .timetable-title h3 {
            margin: 0;
            color: #1a5f7a;
        }
        
        /* 加载更多文件选项 */
        .additional-files {
            margin-top: 15px;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
        }
        
        .additional-files h4 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }
        
        .file-type-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-left: 8px;
        }
        
        .file-type-badge.teacher {
            background: #2a9d8f;
            color: white;
        }
        
        .file-type-badge.class {
            background: #1a5f7a;
            color: white;
        }
    </style>
</head>
<body>
    <!-- 文件选择弹窗 -->
    <div class="modal-overlay" id="fileSelectModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-calendar-alt"></i> 选择课表文件</h3>
                <button class="close-modal" id="closeFileModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="mode-switcher">
                    <button class="mode-btn teacher-mode active" id="teacherModeBtn" data-mode="teacher">
                        <i class="fas fa-chalkboard-teacher"></i> 教师课表
                    </button>
                    <button class="mode-btn class-mode" id="classModeBtn" data-mode="class">
                        <i class="fas fa-users"></i> 班级课表
                    </button>
                </div>
                
                <p id="fileModeDescription">请选择要加载的教师课表文件：</p>
                
                <div class="file-list" id="fileList">
                    <!-- 文件列表动态生成 -->
                </div>
                
                <!-- 其他文件类型 -->
                <div class="additional-files" id="additionalFiles" style="display: none;">
                    <h4>其他课表文件</h4>
                    <div id="otherFileList">
                        <!-- 其他类型文件 -->
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button class="modal-btn secondary" id="cancelSelect">取消</button>
                    <button class="modal-btn primary" id="confirmSelect" disabled>加载选中文件</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 修改控制面板 -->
    <div class="control-panel">
        <div class="data-source-area">
            <button class="data-source-btn" id="selectTimetableBtn">
                <i class="fas fa-calendar-alt"></i> 选择加载课表
                <span id="currentModeIndicator" class="mode-indicator teacher" style="display: none;">
                    <i class="fas fa-chalkboard-teacher"></i> 教师
                </span>
            </button>
        </div>
        
        <div class="current-data-info" id="currentDataInfo" style="display: none;">
            <i class="fas fa-file-code"></i>
            <div class="current-data-text">
                当前加载: <strong id="currentFileName">未选择文件</strong>
                <span id="fileTypeBadge" class="file-type-badge teacher">教师课表</span>
                <div style="font-size: 0.8rem; color: #666; margin-top: 2px;">
                    <span id="currentDataCount">0</span> 条记录 | 
                    最后更新: <span id="currentFileTime">-</span>
                </div>
            </div>
            <button class="refresh-btn" id="refreshFileList">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
        
        <!-- 添加模式切换 -->
        <div class="mode-switcher" id="mainModeSwitcher" style="display: none;">
            <button class="mode-btn teacher-mode active" id="mainTeacherModeBtn" data-mode="teacher">
                <i class="fas fa-chalkboard-teacher"></i> 教师模式
            </button>
            <button class="mode-btn class-mode" id="mainClassModeBtn" data-mode="class">
                <i class="fas fa-users"></i> 班级模式
            </button>
        </div>
        
        <div class="status-area">
            <!-- 状态信息 -->
        </div>
    </div>
    
    <!-- 修改侧边栏 -->
    <div class="teacher-sidebar" id="teacherSidebar">
        <div class="teacher-list-header">
            <div>
                <i class="fas fa-list"></i> 
                <span id="sidebarTitle">教师列表</span> 
                (<span id="dataCountDisplay">0</span>)
            </div>
            <button class="close-sidebar-btn" id="closeSidebarBtn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="dataSearch" 
                       placeholder="搜索..." disabled>
            </div>
            <div class="search-info">
                已显示 <span id="visibleDataCount">0</span> / <span id="totalDataCount">0</span> 条记录
            </div>
        </div>
        
        <div class="teacher-list-container" id="dataList">
            <div class="no-data">请先选择课表文件</div>
        </div>
    </div>
    
    <!-- 修改主内容区域 -->
    <div class="timetable-main" id="timetableMain">
        <div class="teacher-info-header" id="dataInfoHeader" style="display: none;">
            <div class="teacher-info-content">
                <div class="timetable-title">
                    <h3 id="currentDataName">未选择</h3>
                    <span id="currentModeBadge" class="mode-indicator teacher">教师</span>
                </div>
                <div class="teacher-desc" id="currentDataDesc">请从左侧列表查看详细课表</div>
            </div>
            <button class="mobile-show-sidebar" id="showSidebarBtn">
                <i class="fas fa-list"></i> 
                <span id="sidebarBtnText">列表</span>
            </button>
        </div>
        
        <!-- 课表容器 -->
    </div>

    <script>
        // 全局变量
        let currentMode = 'teacher'; // 'teacher' 或 'class'
        let currentDataType = ''; // 当前加载的数据类型
        let teachers = [];
        let classes = [];
        let allDataItems = []; // 统一数据项
        let currentDataIndex = -1;
        
        // 修改文件扫描逻辑
        async function scanForJsonFiles() {
            try {
                const currentPath = window.location.pathname;
                const basePath = currentPath.substring(0, currentPath.lastIndexOf('/')) || '.';
                
                availableFiles = [];
                
                // 常见文件名模式
                const teacherFiles = [
                    '教师课表.json',
                    '教师课表_2023-2024.json',
                    '教师课表_2022-2023.json',
                    'teacher_timetable.json',
                    'teachers.json'
                ];
                
                const classFiles = [
                    '班级课表.json',
                    '班级课表_2023-2024.json',
                    '班级课表_2022-2023.json',
                    'class_timetable.json',
                    'classes.json'
                ];
                
                // 合并所有文件模式
                const allFiles = [...teacherFiles, ...classFiles];
                
                // 测试每个文件是否存在
                for (const fileName of allFiles) {
                    try {
                        const testUrl = basePath + '/' + fileName;
                        const response = await fetch(testUrl, { method: 'HEAD' });
                        if (response.ok) {
                            const isTeacherFile = teacherFiles.includes(fileName);
                            const isClassFile = classFiles.includes(fileName);
                            
                            let fileType = 'unknown';
                            if (isTeacherFile) fileType = 'teacher';
                            if (isClassFile) fileType = 'class';
                            
                            availableFiles.push({
                                name: fileName,
                                path: testUrl,
                                type: fileType,
                                isLocal: true
                            });
                        }
                    } catch (e) {
                        // 文件不存在，忽略
                    }
                }
                
                updateFileList();
                
            } catch (err) {
                console.error('扫描文件失败:', err);
            }
        }
        
        // 更新文件列表显示
        function updateFileList() {
            fileList.innerHTML = '';
            
            // 按类型和文件名排序
            availableFiles.sort((a, b) => {
                if (a.type === b.type) {
                    return a.name.localeCompare(b.name);
                }
                return a.type === 'teacher' ? -1 : 1;
            });
            
            // 过滤当前模式的文件
            const modeFiles = availableFiles.filter(file => file.type === currentMode);
            const otherFiles = availableFiles.filter(file => file.type !== currentMode && file.type !== 'unknown');
            
            // 显示当前模式的文件
            if (modeFiles.length > 0) {
                modeFiles.forEach((file, index) => {
                    const fileItem = createFileItem(file, index);
                    fileList.appendChild(fileItem);
                });
            } else {
                fileList.innerHTML = `
                    <div class="no-files-found">
                        <i class="fas fa-search fa-2x"></i>
                        <h4 style="margin: 10px 0 5px;">未找到${currentMode === 'teacher' ? '教师' : '班级'}课表文件</h4>
                        <p>请将课表JSON文件放在当前目录下</p>
                    </div>
                `;
            }
            
            // 显示其他类型的文件
            if (otherFiles.length > 0) {
                document.getElementById('additionalFiles').style.display = 'block';
                const otherFileList = document.getElementById('otherFileList');
                otherFileList.innerHTML = '';
                
                otherFiles.forEach((file, index) => {
                    const fileItem = createFileItem(file, modeFiles.length + index, true);
                    otherFileList.appendChild(fileItem);
                });
            } else {
                document.getElementById('additionalFiles').style.display = 'none';
            }
            
            // 更新文件描述
            const description = currentMode === 'teacher' 
                ? '请选择要加载的教师课表文件：' 
                : '请选择要加载的班级课表文件：';
            document.getElementById('fileModeDescription').textContent = description;
        }
        
        // 创建文件项
        function createFileItem(file, index, isOther = false) {
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            if (!isOther && index === selectedFileIndex) {
                fileItem.classList.add('active');
            }
            
            const typeText = file.type === 'teacher' ? '教师课表' : 
                           file.type === 'class' ? '班级课表' : '未知类型';
            
            fileItem.innerHTML = `
                <div class="file-item-name">${file.name}</div>
                <div class="file-item-size">
                    ${typeText} ${file.isLocal ? '| 本地文件' : ''}
                </div>
            `;
            
            fileItem.addEventListener('click', () => {
                if (!isOther) {
                    selectFile(index);
                } else {
                    // 点击其他类型文件，切换到对应模式
                    switchMode(file.type);
                    // 重新扫描并选择这个文件
                    setTimeout(() => {
                        const newIndex = availableFiles.findIndex(f => f.path === file.path);
                        if (newIndex !== -1) {
                            selectFile(newIndex);
                        }
                    }, 100);
                }
            });
            
            return fileItem;
        }
        
        // 切换模式
        function switchMode(mode) {
            if (mode === currentMode) return;
            
            currentMode = mode;
            
            // 更新UI
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (mode === 'teacher') {
                document.getElementById('teacherModeBtn').classList.add('active');
                document.getElementById('mainTeacherModeBtn').classList.add('active');
                document.getElementById('currentModeIndicator').className = 'mode-indicator teacher';
                document.getElementById('currentModeIndicator').innerHTML = '<i class="fas fa-chalkboard-teacher"></i> 教师';
                document.getElementById('sidebarTitle').textContent = '教师列表';
                document.getElementById('sidebarBtnText').textContent = '教师列表';
            } else {
                document.getElementById('classModeBtn').classList.add('active');
                document.getElementById('mainClassModeBtn').classList.add('active');
                document.getElementById('currentModeIndicator').className = 'mode-indicator class';
                document.getElementById('currentModeIndicator').innerHTML = '<i class="fas fa-users"></i> 班级';
                document.getElementById('sidebarTitle').textContent = '班级列表';
                document.getElementById('sidebarBtnText').textContent = '班级列表';
            }
            
            // 更新搜索框占位符
            document.getElementById('dataSearch').placeholder = 
                currentMode === 'teacher' ? '搜索教师姓名...' : '搜索班级名称...';
            
            // 重新扫描文件
            scanForJsonFiles();
            
            // 如果已加载数据，重新显示
            if (currentDataType === currentMode) {
                displayDataList();
            } else {
                // 清除数据
                resetData();
            }
        }
        
        // 加载选中的文件
        async function loadSelectedFile() {
            if (selectedFileIndex === -1 || !availableFiles[selectedFileIndex]) {
                showError('请先选择一个课表文件');
                return;
            }
            
            const selectedFile = availableFiles[selectedFileIndex];
            closeFileSelectModal();
            
            // 设置当前数据类型
            currentDataType = selectedFile.type;
            
            // 更新UI
            document.getElementById('mainModeSwitcher').style.display = 'flex';
            document.getElementById('currentModeIndicator').style.display = 'inline-flex';
            
            // 更新文件类型标识
            const fileTypeBadge = document.getElementById('fileTypeBadge');
            fileTypeBadge.textContent = currentDataType === 'teacher' ? '教师课表' : '班级课表';
            fileTypeBadge.className = `file-type-badge ${currentDataType}`;
            
            loadData(selectedFile.path, selectedFile.name);
        }
        
        // 处理JSON数据
        function processJsonData(data, url, fileName) {
            try {
                if (!data || typeof data !== 'object') {
                    throw new Error('JSON数据格式不正确');
                }
                
                if (currentDataType === 'teacher') {
                    if (!data.teachers) {
                        throw new Error('教师课表数据中缺少teachers字段');
                    }
                    teachers = extractTeachers(data);
                    allDataItems = teachers;
                } else {
                    if (!data.classes) {
                        throw new Error('班级课表数据中缺少classes字段');
                    }
                    classes = extractClasses(data);
                    allDataItems = classes;
                }
                
                if (allDataItems.length === 0) {
                    const typeText = currentDataType === 'teacher' ? '教师' : '班级';
                    showError(`${typeText}课表文件中没有找到有效的数据`);
                    return;
                }
                
                jsonData = data;
                
                // 更新显示
                updateCurrentDataInfo(allDataItems.length, fileName);
                displayDataList();
                
                const typeText = currentDataType === 'teacher' ? '教师' : '班级';
                showSuccess(`成功加载 ${allDataItems.length} 条${typeText}课表数据`);
                
            } catch (err) {
                console.error('处理课表数据失败:', err);
                showError(`处理课表数据失败: ${err.message}`);
            }
        }
        
        // 提取班级数据
        function extractClasses(data) {
            const classes = [];
            
            if (data.classes && typeof data.classes === 'object') {
                Object.keys(data.classes).forEach((className, index) => {
                    const classData = data.classes[className];
                    
                    if (classData && classData.data) {
                        classes.push({
                            id: index,
                            name: classData.name || className,
                            description: classData.description || '',
                            rows: classData.rows || 0,
                            cols: classData.cols || 0,
                            data: classData.data || [],
                            type: 'class'
                        });
                    }
                });
            }
            
            return classes;
        }
        
        // 显示数据列表
        function displayDataList() {
            const dataList = document.getElementById('dataList');
            dataList.innerHTML = '';
            allDataItems = [];
            
            const items = currentDataType === 'teacher' ? teachers : classes;
            
            if (items.length === 0) {
                const typeText = currentDataType === 'teacher' ? '教师' : '班级';
                dataList.innerHTML = `<div class="no-teachers-found">未找到${typeText}数据</div>`;
                document.getElementById('visibleDataCount').textContent = '0';
                document.getElementById('totalDataCount').textContent = '0';
                document.getElementById('dataCountDisplay').textContent = '0';
                return;
            }
            
            items.forEach(item => {
                const dataItem = document.createElement('div');
                dataItem.className = currentDataType === 'teacher' ? 'teacher-item' : 'class-card';
                dataItem.dataset.id = item.id;
                dataItem.dataset.name = item.name.toLowerCase();
                dataItem.dataset.description = (item.description || '').toLowerCase();
                
                dataItem.innerHTML = `
                    <div class="${currentDataType === 'teacher' ? 'teacher-item-name' : 'class-name'}" 
                         id="dataName_${item.id}">${item.name}</div>
                    ${item.description ? 
                      `<div class="${currentDataType === 'teacher' ? 'teacher-item-desc' : 'class-desc'}" 
                            id="dataDesc_${item.id}">${item.description}</div>` : ''}
                `;
                
                dataItem.addEventListener('click', () => {
                    selectData(item.id);
                    if (isMobile) {
                        closeSidebar();
                    }
                });
                
                dataList.appendChild(dataItem);
                allDataItems.push(dataItem);
            });
            
            document.getElementById('visibleDataCount').textContent = items.length;
            document.getElementById('totalDataCount').textContent = items.length;
            document.getElementById('dataCountDisplay').textContent = items.length;
            
            if (items.length > 0) {
                selectData(0);
            }
        }
        
        // 选择数据
        function selectData(dataId) {
            const items = currentDataType === 'teacher' ? teachers : classes;
            const data = items.find(d => d.id === dataId);
            if (!data) return;
            
            allDataItems.forEach(item => {
                item.classList.remove('active');
            });
            
            const selectedItem = document.querySelector(`.${currentDataType === 'teacher' ? 'teacher-item' : 'class-card'}[data-id="${dataId}"]:not(.hidden)`);
            if (selectedItem) {
                selectedItem.classList.add('active');
                selectedItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            document.getElementById('currentDataName').textContent = data.name;
            document.getElementById('currentDataDesc').textContent = data.description || `${data.rows}行 × ${data.cols}列`;
            currentDataIndex = dataId;
            
            // 更新模式标识
            const modeBadge = document.getElementById('currentModeBadge');
            modeBadge.textContent = currentDataType === 'teacher' ? '教师' : '班级';
            modeBadge.className = `mode-indicator ${currentDataType}`;
            
            updateMobileTitle(data.name);
            
            showDataTimetable(data);
        }
        
        // 更新当前数据信息
        function updateCurrentDataInfo(count, fileName) {
            document.getElementById('currentFileName').textContent = fileName;
            document.getElementById('currentDataCount').textContent = count;
            document.getElementById('currentFileTime').textContent = new Date().toLocaleTimeString('zh-CN');
            document.getElementById('currentDataInfo').style.display = 'flex';
        }
        
        // 重置数据
        function resetData() {
            teachers = [];
            classes = [];
            allDataItems = [];
            currentDataIndex = -1;
            
            document.getElementById('dataInfoHeader').style.display = 'none';
            document.getElementById('timetableContent').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'block';
            document.getElementById('dataList').innerHTML = '<div class="no-data">请先选择课表文件</div>';
            
            document.getElementById('dataCountDisplay').textContent = '0';
            document.getElementById('totalDataCount').textContent = '0';
            document.getElementById('visibleDataCount').textContent = '0';
            
            document.getElementById('dataSearch').value = '';
            document.getElementById('dataSearch').disabled = true;
            document.getElementById('dataSearch').placeholder = '请先选择课表文件';
            
            updateMobileTitle('');
        }
        
        // 初始化事件监听器
        function initEventListeners() {
            // 原有的监听器...
            
            // 添加模式切换监听
            document.getElementById('teacherModeBtn').addEventListener('click', () => switchMode('teacher'));
            document.getElementById('classModeBtn').addEventListener('click', () => switchMode('class'));
            document.getElementById('mainTeacherModeBtn').addEventListener('click', () => switchMode('teacher'));
            document.getElementById('mainClassModeBtn').addEventListener('click', () => switchMode('class'));
        }
    </script>
</body>
</html>
