<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级与教师课表查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        /* 手机端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            z-index: 1001;
        }
        
        .mobile-menu-btn span {
            display: block;
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        
        .mobile-menu-btn.active span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }
        
        .mobile-menu-btn.active span:nth-child(2) {
            opacity: 0;
        }
        
        .mobile-menu-btn.active span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }
        
        .main-content {
            display: flex;
            min-height: 700px;
        }
        
        /* 桌面端侧边栏 */
        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }
        
        /* 手机端侧边栏 */
        .mobile-sidebar {
            display: none;
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            flex-direction: column;
        }
        
        .mobile-sidebar.active {
            right: 0;
        }
        
        .mobile-sidebar-header {
            padding: 20px;
            background: #667eea;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .mobile-sidebar-header h2 {
            font-size: 1.2em;
        }
        
        .close-menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
        }
        
        .sidebar-section {
            flex: 1;
            padding: 25px;
            border-bottom: 1px solid #e9ecef;
            overflow-y: auto;
        }
        
        .sidebar-section:last-child {
            border-bottom: none;
        }
        
        .sidebar-section h2 {
            color: #495057;
            font-size: 1.3em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .list-container {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .list-container ul {
            list-style: none;
        }
        
        .list-container li {
            margin-bottom: 8px;
        }
        
        .list-item-btn {
            width: 100%;
            padding: 12px 15px;
            text-align: left;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
            color: #495057;
        }
        
        .list-item-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateX(5px);
        }
        
        .list-item-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .content-area {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        
        .controls {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .btn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
        }
        
        .schedule-display {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .schedule-header {
            margin-bottom: 20px;
        }
        
        .schedule-header h2 {
            color: #495057;
            font-size: 1.5em;
        }
        
        .schedule-container {
            flex: 1;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            overflow: auto;
            background: white;
        }
        
        /* 优化表格响应式 - 新增统一宽度和高度的设置 */
        .responsive-table {
            width: 100%;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 300px;
            table-layout: fixed; /* 固定表格布局，使列宽平均分配 */
        }
        
        /* 节次列保持固定宽度 */
        th:first-child,
        td:first-child {
            width: 60px; /* 节次列固定宽度 */
            min-width: 60px;
        }
        
        /* 星期一到星期五列宽平均分配 */
        th:not(:first-child),
        td:not(:first-child) {
            width: 20%; /* 5列平分100%宽度，平均分配 */
        }
        
        /* 统一行高 */
        tbody tr {
            height: 60px; /* 统一的行高 */
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            position: sticky;
            top: 0;
            white-space: nowrap;
            font-size: 0.9em;
        }
        
        td {
            padding: 10px 8px;
            border: 1px solid #e9ecef;
            text-align: center;
            word-break: break-word;
            font-size: 0.85em;
            vertical-align: middle; /* 垂直居中 */
        }
        
        .period-cell {
            background: #f8f9fa;
            font-weight: 600;
            color: #495057;
        }
        
        .course-cell {
            background: #f0f7ff;
            transition: all 0.2s ease;
        }
        
        .course-cell:hover {
            background: #e3f2fd;
        }
        
        .empty-cell {
            background: #f8f9fa;
        }
        
        .message-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }
        
        .no-data {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 20px;
        }
        
        .no-data-cell {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 40px;
        }
        
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .modal-header {
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #495057;
            font-size: 1.3em;
        }
        
        .modal-body {
            margin-bottom: 20px;
        }
        
        .json-file-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 10px;
        }
        
        .json-file-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .json-file-item:hover {
            border-color: #667eea;
            background: #f0f3ff;
        }
        
        .json-file-item.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .btn-outline {
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .btn-outline:hover {
            background: #667eea;
            color: white;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                border-radius: 10px;
            }
            
            .header {
                padding: 20px 15px;
                position: relative;
            }
            
            .header h1 {
                font-size: 1.5em;
                margin-bottom: 5px;
            }
            
            .header p {
                font-size: 0.9em;
            }
            
            .mobile-menu-btn {
                display: flex;
            }
            
            .main-content {
                flex-direction: column;
                min-height: auto;
            }
            
            .sidebar {
                display: none;
            }
            
            .mobile-sidebar {
                display: flex;
            }
            
            .content-area {
                padding: 15px;
            }
            
            .controls {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 15px;
            }
            
            .btn {
                width: 100%;
                padding: 12px 15px;
                justify-content: center;
            }
            
            .schedule-header {
                margin-bottom: 15px;
            }
            
            .schedule-header h2 {
                font-size: 1.2em;
            }
            
            .schedule-container {
                border-radius: 8px;
            }
            
            .modal-content {
                margin: 20% auto;
                padding: 20px;
                width: 95%;
            }
            
            /* 移动端表格调整 */
            table {
                min-width: 250px;
            }
            
            /* 移动端节次列更窄 */
            th:first-child,
            td:first-child {
                width: 40px;
                min-width: 40px;
            }
            
            /* 移动端行高稍小 */
            tbody tr {
                height: 50px;
            }
            
            th, td {
                padding: 8px 5px;
                font-size: 0.9em;
            }
            
            .period-cell {
                padding: 8px 3px;
            }
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.3em;
            }
            
            .mobile-sidebar {
                width: 85%;
                right: -85%;
            }
            
            .sidebar-section {
                padding: 20px 15px;
            }
            
            .schedule-header h2 {
                font-size: 1.1em;
            }
            
            table {
                min-width: 200px;
            }
            
            th, td {
                padding: 6px 3px;
                font-size: 0.85em;
            }
            
            /* 小屏幕设备进一步调整 */
            th:first-child,
            td:first-child {
                width: 35px;
                min-width: 35px;
            }
            
            tbody tr {
                height: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <h1>📚 班级与教师课表查询系统</h1>
            <p>点击"选择JSON文件"加载课表数据</p>
        </div>
        
        <div class="main-content">
            <!-- 桌面端侧边栏 -->
            <div class="sidebar">
                <!-- 班级列表 -->
                <div class="sidebar-section">
                    <h2>🏫 班级列表</h2>
                    <div class="list-container">
                        <ul id="classesList">
                            <li class="no-data">请先加载课表数据</li>
                        </ul>
                    </div>
                </div>
                
                <!-- 教师列表 -->
                <div class="sidebar-section">
                    <h2>👨‍🏫 教师列表</h2>
                    <div class="list-container">
                        <ul id="teachersList">
                            <li class="no-data">请先加载课表数据</li>
                        </ul>
                    </div>
                </div>
                
                <!-- 搜索框 -->
                <div class="sidebar-section">
                    <h2>🔍 搜索</h2>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索班级或教师..." disabled>
                    </div>
                </div>
            </div>
            
            <!-- 手机端侧边栏菜单 -->
            <div class="mobile-sidebar" id="mobileSidebar">
                <div class="mobile-sidebar-header">
                    <h2>📋 菜单</h2>
                    <button class="close-menu-btn" id="closeMenuBtn">×</button>
                </div>
                
                <!-- 班级列表 -->
                <div class="sidebar-section">
                    <h2>🏫 班级列表</h2>
                    <div class="list-container">
                        <ul id="mobileClassesList">
                            <li class="no-data">请先加载课表数据</li>
                        </ul>
                    </div>
                </div>
                
                <!-- 教师列表 -->
                <div class="sidebar-section">
                    <h2>👨‍🏫 教师列表</h2>
                    <div class="list-container">
                        <ul id="mobileTeachersList">
                            <li class="no-data">请先加载课表数据</li>
                        </ul>
                    </div>
                </div>
                
                <!-- 搜索框 -->
                <div class="sidebar-section">
                    <h2>🔍 搜索</h2>
                    <div class="search-box">
                        <input type="text" id="mobileSearchInput" placeholder="搜索班级或教师..." disabled>
                        <button class="btn" id="mobileResetSearch" style="margin-top: 10px; width: 100%; padding: 10px; font-size: 0.9em;" disabled>
                            重置搜索
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 主要内容区域 -->
            <div class="content-area">
                <!-- 控制区域 -->
                <div class="controls">
                    <button class="btn" id="loadJsonBtn">
                        <span>📁 选择JSON文件</span>
                    </button>
                    
                    <button class="btn btn-secondary" id="resetSearch" disabled>
                        <span>🔄 重置搜索</span>
                    </button>
                </div>
                
                <!-- 课表显示区域 -->
                <div class="schedule-display">
                    <div class="schedule-header">
                        <h2 id="scheduleTitle">请选择JSON文件查看课表</h2>
                    </div>
                    
                    <div class="schedule-container">
                        <div class="responsive-table">
                            <table id="scheduleTable">
                                <tr>
                                    <td class="no-data-cell">未选择课表</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
                
                <!-- 消息区域 -->
                <div class="message-area" id="message"></div>
            </div>
        </div>
    </div>

    <!-- JSON文件选择模态框 -->
    <div id="jsonFileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📁 选择JSON课表文件</h2>
            </div>
            <div class="modal-body">
                <div class="json-file-list" id="jsonFileList">
                    <div class="no-data">正在扫描同路径下的JSON文件...</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" id="closeModal">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let allClasses = [];
        let allTeachers = [];
        let currentSchedule = null;
        let currentType = null;
        let allSchedules = null;
        let currentJsonFile = null;
        let jsonFiles = [];
        let isMobile = false;

        // DOM元素
        let classesListElement = null;
        let teachersListElement = null;
        let scheduleTableElement = null;
        let scheduleTitleElement = null;
        let searchInputElement = null;
        let messageElement = null;
        let jsonFileListElement = null;
        let jsonFileModal = null;
        let loadJsonBtn = null;
        let closeModalBtn = null;
        let resetSearchBtn = null;
        let mobileMenuBtn = null;
        let mobileSidebar = null;
        let closeMenuBtn = null;
        let mobileSearchInput = null;
        let mobileResetSearchBtn = null;
        let mobileClassesList = null;
        let mobileTeachersList = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            checkMobileDevice();
            initializeElements();
            initializeEventListeners();
        });

        // 检测是否为移动设备
        function checkMobileDevice() {
            isMobile = window.innerWidth <= 768;
        }

        // 初始化DOM元素
        function initializeElements() {
            classesListElement = document.getElementById('classesList');
            teachersListElement = document.getElementById('teachersList');
            scheduleTableElement = document.getElementById('scheduleTable');
            scheduleTitleElement = document.getElementById('scheduleTitle');
            searchInputElement = document.getElementById('searchInput');
            messageElement = document.getElementById('message');
            jsonFileListElement = document.getElementById('jsonFileList');
            jsonFileModal = document.getElementById('jsonFileModal');
            loadJsonBtn = document.getElementById('loadJsonBtn');
            closeModalBtn = document.getElementById('closeModal');
            resetSearchBtn = document.getElementById('resetSearch');
            
            // 移动端元素
            mobileMenuBtn = document.getElementById('mobileMenuBtn');
            mobileSidebar = document.getElementById('mobileSidebar');
            closeMenuBtn = document.getElementById('closeMenuBtn');
            mobileSearchInput = document.getElementById('mobileSearchInput');
            mobileResetSearchBtn = document.getElementById('mobileResetSearch');
            mobileClassesList = document.getElementById('mobileClassesList');
            mobileTeachersList = document.getElementById('mobileTeachersList');
        }

        // 初始化事件监听器
        function initializeEventListeners() {
            // 加载JSON按钮事件
            if (loadJsonBtn) {
                loadJsonBtn.addEventListener('click', showJsonFileModal);
            }
            
            // 关闭模态框按钮事件
            if (closeModalBtn) {
                closeModalBtn.addEventListener('click', hideJsonFileModal);
            }
            
            // 点击模态框背景关闭
            if (jsonFileModal) {
                jsonFileModal.addEventListener('click', function(event) {
                    if (event.target === jsonFileModal) {
                        hideJsonFileModal();
                    }
                });
            }
            
            // 桌面端搜索框事件
            if (searchInputElement) {
                searchInputElement.addEventListener('input', handleSearch);
                searchInputElement.addEventListener('keyup', function(event) {
                    if (event.key === 'Enter') {
                        performSearch();
                    }
                });
            }
            
            // 桌面端重置搜索按钮事件
            if (resetSearchBtn) {
                resetSearchBtn.addEventListener('click', resetSearch);
            }
            
            // 移动端事件监听器
            if (isMobile) {
                // 移动端菜单按钮
                if (mobileMenuBtn) {
                    mobileMenuBtn.addEventListener('click', toggleMobileMenu);
                }
                
                // 移动端关闭菜单按钮
                if (closeMenuBtn) {
                    closeMenuBtn.addEventListener('click', closeMobileMenu);
                }
                
                // 移动端搜索框事件
                if (mobileSearchInput) {
                    mobileSearchInput.addEventListener('input', handleMobileSearch);
                    mobileSearchInput.addEventListener('keyup', function(event) {
                        if (event.key === 'Enter') {
                            performMobileSearch();
                        }
                    });
                }
                
                // 移动端重置搜索按钮
                if (mobileResetSearchBtn) {
                    mobileResetSearchBtn.addEventListener('click', resetMobileSearch);
                }
                
                // 点击菜单外区域关闭菜单
                document.addEventListener('click', function(event) {
                    if (mobileSidebar.classList.contains('active') && 
                        !mobileSidebar.contains(event.target) && 
                        event.target !== mobileMenuBtn) {
                        closeMobileMenu();
                    }
                });
            }
            
            // 窗口大小变化时重新检测设备
            window.addEventListener('resize', function() {
                checkMobileDevice();
            });
        }

        // 切换移动端菜单
        function toggleMobileMenu() {
            if (!mobileSidebar || !mobileMenuBtn) return;
            
            mobileSidebar.classList.toggle('active');
            mobileMenuBtn.classList.toggle('active');
        }

        // 关闭移动端菜单
        function closeMobileMenu() {
            if (!mobileSidebar || !mobileMenuBtn) return;
            
            mobileSidebar.classList.remove('active');
            mobileMenuBtn.classList.remove('active');
        }

        // 处理移动端搜索
        function handleMobileSearch() {
            const searchTerm = mobileSearchInput.value.trim().toLowerCase();
            
            if (searchTerm === '') {
                resetMobileSearch();
                return;
            }
            
            const filteredClasses = allClasses.filter(classData => 
                classData.name.toLowerCase().includes(searchTerm) ||
                (classData.description && classData.description.toLowerCase().includes(searchTerm))
            );
            
            const filteredTeachers = allTeachers.filter(teacher => 
                teacher.name.toLowerCase().includes(searchTerm) ||
                (teacher.description && teacher.description.toLowerCase().includes(searchTerm))
            );
            
            updateMobileFilteredLists(filteredClasses, filteredTeachers);
        }

        // 执行移动端搜索
        function performMobileSearch() {
            handleMobileSearch();
        }

        // 重置移动端搜索
        function resetMobileSearch() {
            if (mobileSearchInput) {
                mobileSearchInput.value = '';
            }
            updateMobileClassesList();
            updateMobileTeachersList();
        }

        // 更新移动端过滤后的列表
        function updateMobileFilteredLists(filteredClasses, filteredTeachers) {
            updateFilteredMobileList(mobileClassesList, filteredClasses, 'class');
            updateFilteredMobileList(mobileTeachersList, filteredTeachers, 'teacher');
        }

        // 更新移动端过滤列表
        function updateFilteredMobileList(listElement, items, type) {
            if (!listElement) return;
            
            listElement.innerHTML = '';
            
            if (items.length === 0) {
                const li = document.createElement('li');
                li.textContent = type === 'class' ? '无匹配班级' : '无匹配教师';
                li.className = 'no-data';
                listElement.appendChild(li);
            } else {
                items.forEach((item, index) => {
                    const li = document.createElement('li');
                    const button = document.createElement('button');
                    button.textContent = `${item.name}${item.description ? ' - ' + item.description : ''}`;
                    button.className = 'list-item-btn';
                    
                    if (currentSchedule && currentSchedule.name === item.name && currentType === type) {
                        button.classList.add('active');
                    }
                    
                    button.addEventListener('click', () => {
                        showSchedule(item, type);
                        closeMobileMenu();
                    });
                    
                    li.appendChild(button);
                    listElement.appendChild(li);
                });
            }
        }

        // 显示JSON文件选择模态框
        function showJsonFileModal() {
            if (!jsonFileModal) return;
            
            jsonFileModal.style.display = 'block';
            scanJsonFiles();
        }

        // 隐藏JSON文件选择模态框
        function hideJsonFileModal() {
            if (!jsonFileModal) return;
            
            jsonFileModal.style.display = 'none';
        }

        // 扫描JSON文件
        async function scanJsonFiles() {
            try {
                showMessageInModal('正在扫描同路径下的JSON文件...');
                
                const fileList = await getJsonFiles();
                
                if (fileList.length === 0) {
                    showMessageInModal('未在同路径下找到JSON文件。请确保有课表JSON文件存在。');
                    return;
                }
                
                jsonFiles = fileList;
                updateJsonFileList(fileList);
                
            } catch (err) {
                console.error('扫描JSON文件失败:', err);
                showMessageInModal('扫描文件失败: ' + err.message);
            }
        }

        // 获取JSON文件列表
        async function getJsonFiles() {
            try {
                const fileList = [];
                
                // 首先尝试预定义的文件
                const defaultFiles = [
                    '202409课表.json',
                    '202410课表.json',
                    '202411课表.json',
                    '课表.json',
                    'schedule.json',
                    'timetable.json',
                    'data.json'
                ];
                
                for (const fileName of defaultFiles) {
                    try {
                        const response = await fetch(fileName, { 
                            method: 'HEAD',
                            cache: 'no-cache'
                        });
                        
                        if (response.ok) {
                            fileList.push(fileName);
                        }
                    } catch (err) {
                        // 继续尝试下一个文件
                    }
                }
                
                // 如果已经找到文件，直接返回
                if (fileList.length > 0) {
                    return fileList;
                }
                
                // 尝试获取目录列表
                try {
                    const response = await fetch('/');
                    if (response.ok) {
                        const text = await response.text();
                        
                        // 从HTML中提取.json文件
                        const regex = /href="([^"]+\.json)"/gi;
                        let match;
                        const foundFiles = [];
                        
                        while ((match = regex.exec(text)) !== null) {
                            const fileName = match[1];
                            // 过滤掉路径中的文件
                            if (!fileName.includes('/') && !fileName.includes('\\')) {
                                foundFiles.push(fileName);
                            }
                        }
                        
                        // 去重并添加到列表
                        const uniqueFiles = [...new Set(foundFiles)];
                        fileList.push(...uniqueFiles);
                    }
                } catch (dirErr) {
                    console.log('无法获取目录列表，将只使用预定义文件');
                }
                
                return fileList;
                
            } catch (err) {
                console.error('扫描文件失败:', err);
                return [];
            }
        }

        // 在模态框中显示消息
        function showMessageInModal(text) {
            if (!jsonFileListElement) return;
            
            jsonFileListElement.innerHTML = `<div class="no-data">${text}</div>`;
        }

        // 更新JSON文件列表
        function updateJsonFileList(files) {
            if (!jsonFileListElement) return;
            
            jsonFileListElement.innerHTML = '';
            
            if (files.length === 0) {
                showMessageInModal('未找到JSON文件');
                return;
            }
            
            files.forEach((fileName, index) => {
                const div = document.createElement('div');
                div.textContent = fileName;
                div.className = 'json-file-item';
                
                if (currentJsonFile === fileName) {
                    div.classList.add('active');
                }
                
                div.addEventListener('click', () => {
                    loadJsonFile(fileName);
                });
                
                jsonFileListElement.appendChild(div);
            });
        }

        // 加载JSON文件
        async function loadJsonFile(fileName) {
            try {
                hideJsonFileModal();
                showMessage(`正在加载: ${fileName}`, '#3498db');
                currentJsonFile = fileName;
                
                const response = await fetch(fileName, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                processJsonData(data, fileName);
                
            } catch (err) {
                console.error('加载JSON文件失败:', err);
                showError(`加载文件失败: ${err.message}`);
            }
        }

        // 处理JSON数据
        function processJsonData(data, fileName) {
            try {
                let classes = [];
                let teachers = [];
                
                console.log('开始处理课表数据...');
                console.log('原始数据结构:', Object.keys(data));
                
                if (data.teachers) {
                    console.log('teachers字段存在，包含项目数:', Object.keys(data.teachers).length);
                    
                    classes = extractClasses(data.teachers);
                    teachers = extractTeachers(data.teachers);
                    
                    console.log('提取到的班级数量:', classes.length, '班级列表:', classes.map(c => c.name));
                    console.log('提取到的教师数量:', teachers.length, '教师列表:', teachers.map(t => t.name));
                } else if (data.classes) {
                    classes = extractClassesFromSeparateField(data.classes);
                    if (data.teachers) {
                        teachers = extractTeachers(data.teachers);
                    }
                } else {
                    classes = extractClasses(data);
                    teachers = extractTeachers(data);
                }
                
                allClasses = classes;
                allTeachers = teachers;
                allSchedules = classes.concat(teachers);
                
                updateClassesList();
                updateTeachersList();
                updateMobileClassesList();
                updateMobileTeachersList();
                
                if (classes.length > 0) {
                    showSchedule(classes[0], 'class');
                } else if (teachers.length > 0) {
                    showSchedule(teachers[0], 'teacher');
                } else {
                    showError('未找到有效的课表数据');
                }
                
                if (scheduleTitleElement) {
                    scheduleTitleElement.textContent = `已加载: ${fileName}`;
                }
                
                if (messageElement) {
                    const classCount = classes.length;
                    const teacherCount = teachers.length;
                    messageElement.textContent = `成功加载: ${classCount}个班级, ${teacherCount}位教师`;
                    messageElement.style.color = '#27ae60';
                    
                    setTimeout(() => {
                        messageElement.style.opacity = '0';
                        setTimeout(() => {
                            messageElement.textContent = '';
                            messageElement.style.opacity = '1';
                        }, 500);
                    }, 3000);
                }
                
                if (searchInputElement) {
                    searchInputElement.disabled = false;
                    searchInputElement.placeholder = '搜索班级或教师...';
                }
                
                if (mobileSearchInput) {
                    mobileSearchInput.disabled = false;
                    mobileSearchInput.placeholder = '搜索班级或教师...';
                }
                
                if (resetSearchBtn) {
                    resetSearchBtn.disabled = false;
                }
                
                if (mobileResetSearchBtn) {
                    mobileResetSearchBtn.disabled = false;
                }
                
            } catch (err) {
                console.error('处理课表数据失败:', err);
                showError(`处理课表数据失败: ${err.message}`);
            }
        }

        // 从单独字段提取班级数据
        function extractClassesFromSeparateField(classesData) {
            const classes = [];
            
            if (classesData && typeof classesData === 'object') {
                Object.keys(classesData).forEach((className, index) => {
                    const classData = classesData[className];
                    
                    if (classData && classData.data) {
                        classes.push({
                            id: index,
                            name: classData.name || className,
                            description: classData.description || '',
                            rows: classData.rows || 0,
                            cols: classData.cols || 0,
                            data: classData.data || []
                        });
                    }
                });
            }
            
            classes.sort((a, b) => {
                const gradeA = extractGrade(a.name);
                const gradeB = extractGrade(b.name);
                const classNumA = extractClassNumber(a.name);
                const classNumB = extractClassNumber(b.name);
                
                if (gradeA !== gradeB) {
                    return gradeA - gradeB;
                }
                return classNumA - classNumB;
            });
            
            return classes;
        }

        // 提取班级课表
        function extractClasses(teachersData) {
            const classes = [];
            
            if (teachersData && typeof teachersData === 'object') {
                Object.keys(teachersData).forEach((key, index) => {
                    const item = teachersData[key];
                    
                    if (item && item.data && isClassName(item.name || key)) {
                        classes.push({
                            id: index,
                            name: item.name || key,
                            description: item.description || '',
                            rows: item.rows || 0,
                            cols: item.cols || 0,
                            data: item.data || []
                        });
                    }
                });
            }
            
            classes.sort((a, b) => {
                const gradeA = extractGrade(a.name);
                const gradeB = extractGrade(b.name);
                const classNumA = extractClassNumber(a.name);
                const classNumB = extractClassNumber(b.name);
                
                if (gradeA !== gradeB) {
                    return gradeA - gradeB;
                }
                return classNumA - classNumB;
            });
            
            return classes;
        }

        // 提取教师课表
        function extractTeachers(teachersData) {
            const teachers = [];
            
            if (teachersData && typeof teachersData === 'object') {
                Object.keys(teachersData).forEach((key, index) => {
                    const item = teachersData[key];
                    
                    if (item && item.data && !isClassName(item.name || key)) {
                        teachers.push({
                            id: index,
                            name: item.name || key,
                            description: item.description || '',
                            rows: item.rows || 0,
                            cols: item.cols || 0,
                            data: item.data || []
                        });
                    }
                });
            }
            
            teachers.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
            
            return teachers;
        }

        // 判断是否为班级名称
        function isClassName(name) {
            if (!name) return false;
            
            const hasClassCharacter = name.includes('班');
            const hasNumbers = /\d/.test(name);
            
            return hasClassCharacter && hasNumbers;
        }

        // 提取年级数字
        function extractGrade(className) {
            if (!className) return 0;
            
            const match = className.match(/([初高一二三])/);
            if (!match) return 0;
            
            const gradeMap = {
                '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6,
                '七': 7, '八': 8, '九': 9, '十': 10
            };
            
            return gradeMap[match[1]] || 0;
        }

        // 提取班级编号
        function extractClassNumber(className) {
            if (!className) return 0;
            
            const match = className.match(/(\d+)/);
            return match ? parseInt(match[1], 10) : 0;
        }

        // 更新桌面端班级列表
        function updateClassesList() {
            if (!classesListElement) return;
            
            classesListElement.innerHTML = '';
            
            if (allClasses.length === 0) {
                const li = document.createElement('li');
                li.textContent = '无班级数据';
                li.className = 'no-data';
                classesListElement.appendChild(li);
                return;
            }
            
            allClasses.forEach((classData, index) => {
                const li = document.createElement('li');
                const button = document.createElement('button');
                button.textContent = `${classData.name}${classData.description ? ' - ' + classData.description : ''}`;
                button.className = 'list-item-btn';
                
                if (currentSchedule && currentSchedule.name === classData.name && currentType === 'class') {
                    button.classList.add('active');
                }
                
                button.addEventListener('click', () => {
                    showSchedule(classData, 'class');
                });
                
                li.appendChild(button);
                classesListElement.appendChild(li);
            });
        }

        // 更新桌面端教师列表
        function updateTeachersList() {
            if (!teachersListElement) return;
            
            teachersListElement.innerHTML = '';
            
            if (allTeachers.length === 0) {
                const li = document.createElement('li');
                li.textContent = '无教师数据';
                li.className = 'no-data';
                teachersListElement.appendChild(li);
                return;
            }
            
            allTeachers.forEach((teacher, index) => {
                const li = document.createElement('li');
                const button = document.createElement('button');
                button.textContent = `${teacher.name}${teacher.description ? ' - ' + teacher.description : ''}`;
                button.className = 'list-item-btn';
                
                if (currentSchedule && currentSchedule.name === teacher.name && currentType === 'teacher') {
                    button.classList.add('active');
                }
                
                button.addEventListener('click', () => {
                    showSchedule(teacher, 'teacher');
                });
                
                li.appendChild(button);
                teachersListElement.appendChild(li);
            });
        }

        // 更新移动端班级列表
        function updateMobileClassesList() {
            if (!mobileClassesList) return;
            
            mobileClassesList.innerHTML = '';
            
            if (allClasses.length === 0) {
                const li = document.createElement('li');
                li.textContent = '无班级数据';
                li.className = 'no-data';
                mobileClassesList.appendChild(li);
                return;
            }
            
            allClasses.forEach((classData, index) => {
                const li = document.createElement('li');
                const button = document.createElement('button');
                button.textContent = `${classData.name}${classData.description ? ' - ' + classData.description : ''}`;
                button.className = 'list-item-btn';
                
                if (currentSchedule && currentSchedule.name === classData.name && currentType === 'class') {
                    button.classList.add('active');
                }
                
                button.addEventListener('click', () => {
                    showSchedule(classData, 'class');
                    closeMobileMenu();
                });
                
                li.appendChild(button);
                mobileClassesList.appendChild(li);
            });
        }

        // 更新移动端教师列表
        function updateMobileTeachersList() {
            if (!mobileTeachersList) return;
            
            mobileTeachersList.innerHTML = '';
            
            if (allTeachers.length === 0) {
                const li = document.createElement('li');
                li.textContent = '无教师数据';
                li.className = 'no-data';
                mobileTeachersList.appendChild(li);
                return;
            }
            
            allTeachers.forEach((teacher, index) => {
                const li = document.createElement('li');
                const button = document.createElement('button');
                button.textContent = `${teacher.name}${teacher.description ? ' - ' + teacher.description : ''}`;
                button.className = 'list-item-btn';
                
                if (currentSchedule && currentSchedule.name === teacher.name && currentType === 'teacher') {
                    button.classList.add('active');
                }
                
                button.addEventListener('click', () => {
                    showSchedule(teacher, 'teacher');
                    closeMobileMenu();
                });
                
                li.appendChild(button);
                mobileTeachersList.appendChild(li);
            });
        }

        // 显示课表
        function showSchedule(schedule, type) {
            if (!schedule || !scheduleTableElement || !scheduleTitleElement) return;
            
            currentSchedule = schedule;
            currentType = type;
            
            scheduleTitleElement.textContent = `${type === 'class' ? '班级' : '教师'}课表 - ${schedule.name}`;
            if (schedule.description) {
                scheduleTitleElement.textContent += ` (${schedule.description})`;
            }
            
            scheduleTableElement.innerHTML = '';
            
            if (!schedule.data || !Array.isArray(schedule.data) || schedule.data.length === 0) {
                const row = scheduleTableElement.insertRow();
                const cell = row.insertCell();
                cell.colSpan = schedule.cols || 6;
                cell.textContent = '无课表数据';
                cell.className = 'no-data-cell';
                return;
            }
            
            const data = schedule.data;
            
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            
            if (data[0] && Array.isArray(data[0])) {
                data[0].forEach((cell, colIndex) => {
                    const th = document.createElement('th');
                    th.innerHTML = cell;
                    headerRow.appendChild(th);
                });
            }
            
            thead.appendChild(headerRow);
            scheduleTableElement.appendChild(thead);
            
            const tbody = document.createElement('tbody');
            
            for (let i = 1; i < data.length; i++) {
                if (!Array.isArray(data[i])) continue;
                
                const row = document.createElement('tr');
                
                data[i].forEach((cell, colIndex) => {
                    const td = document.createElement('td');
                    td.innerHTML = cell;
                    
                    if (colIndex === 0) {
                        td.className = 'period-cell';
                    } else if (cell && cell.trim() !== '') {
                        td.className = 'course-cell';
                    } else {
                        td.className = 'empty-cell';
                    }
                    
                    row.appendChild(td);
                });
                
                tbody.appendChild(row);
            }
            
            scheduleTableElement.appendChild(tbody);
            
            updateClassesList();
            updateTeachersList();
            updateMobileClassesList();
            updateMobileTeachersList();
            
            if (isMobile) {
                closeMobileMenu();
            }
        }

        // 处理桌面端搜索
        function handleSearch() {
            const searchTerm = searchInputElement.value.trim().toLowerCase();
            
            if (searchTerm === '') {
                resetSearch();
                return;
            }
            
            const filteredClasses = allClasses.filter(classData => 
                classData.name.toLowerCase().includes(searchTerm) ||
                (classData.description && classData.description.toLowerCase().includes(searchTerm))
            );
            
            const filteredTeachers = allTeachers.filter(teacher => 
                teacher.name.toLowerCase().includes(searchTerm) ||
                (teacher.description && teacher.description.toLowerCase().includes(searchTerm))
            );
            
            updateFilteredLists(filteredClasses, filteredTeachers);
        }

        // 执行桌面端搜索
        function performSearch() {
            handleSearch();
        }

        // 重置桌面端搜索
        function resetSearch() {
            if (searchInputElement) {
                searchInputElement.value = '';
            }
            updateClassesList();
            updateTeachersList();
        }

        // 更新桌面端过滤后的列表
        function updateFilteredLists(filteredClasses, filteredTeachers) {
            if (classesListElement) {
                classesListElement.innerHTML = '';
                
                if (filteredClasses.length === 0) {
                    const li = document.createElement('li');
                    li.textContent = '无匹配班级';
                    li.className = 'no-data';
                    classesListElement.appendChild(li);
                } else {
                    filteredClasses.forEach((classData, index) => {
                        const li = document.createElement('li');
                        const button = document.createElement('button');
                        button.textContent = `${classData.name}${classData.description ? ' - ' + classData.description : ''}`;
                        button.className = 'list-item-btn';
                        
                        if (currentSchedule && currentSchedule.name === classData.name && currentType === 'class') {
                            button.classList.add('active');
                        }
                        
                        button.addEventListener('click', () => {
                            showSchedule(classData, 'class');
                        });
                        
                        li.appendChild(button);
                        classesListElement.appendChild(li);
                    });
                }
            }
            
            if (teachersListElement) {
                teachersListElement.innerHTML = '';
                
                if (filteredTeachers.length === 0) {
                    const li = document.createElement('li');
                    li.textContent = '无匹配教师';
                    li.className = 'no-data';
                    teachersListElement.appendChild(li);
                } else {
                    filteredTeachers.forEach((teacher, index) => {
                        const li = document.createElement('li');
                        const button = document.createElement('button');
                        button.textContent = `${teacher.name}${teacher.description ? ' - ' + teacher.description : ''}`;
                        button.className = 'list-item-btn';
                        
                        if (currentSchedule && currentSchedule.name === teacher.name && currentType === 'teacher') {
                            button.classList.add('active');
                        }
                        
                        button.addEventListener('click', () => {
                            showSchedule(teacher, 'teacher');
                        });
                        
                        li.appendChild(button);
                        teachersListElement.appendChild(li);
                    });
                }
            }
        }

        // 显示消息
        function showMessage(text, color = '#3498db') {
            if (!messageElement) return;
            
            messageElement.textContent = text;
            messageElement.style.color = color;
            messageElement.style.opacity = '1';
        }

        // 显示错误
        function showError(text) {
            if (!messageElement) return;
            
            messageElement.textContent = text;
            messageElement.style.color = '#e74c3c';
            messageElement.style.opacity = '1';
            
            setTimeout(() => {
                messageElement.style.opacity = '0';
                setTimeout(() => {
                    messageElement.textContent = '';
                    messageElement.style.opacity = '1';
                }, 500);
            }, 5000);
        }
    </script>
