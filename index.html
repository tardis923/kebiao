<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级与教师课表查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .main-content {
            display: flex;
            min-height: 700px;
        }
        
        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-section {
            flex: 1;
            padding: 25px;
            border-bottom: 1px solid #e9ecef;
            overflow-y: auto;
        }
        
        .sidebar-section:last-child {
            border-bottom: none;
        }
        
        .sidebar-section h2 {
            color: #495057;
            font-size: 1.3em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .list-container {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .list-container ul {
            list-style: none;
        }
        
        .list-container li {
            margin-bottom: 8px;
        }
        
        .list-item-btn {
            width: 100%;
            padding: 12px 15px;
            text-align: left;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
            color: #495057;
        }
        
        .list-item-btn:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateX(5px);
        }
        
        .list-item-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .content-area {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        
        .controls {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .btn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
        }
        
        .sample-data-section {
            margin-top: 20px;
        }
        
        .sample-data-section h3 {
            color: #495057;
            margin-bottom: 12px;
            font-size: 1.1em;
        }
        
        .sample-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .sample-data-btn {
            padding: 8px 15px;
            background: #e9ecef;
            color: #495057;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }
        
        .sample-data-btn:hover {
            background: #dee2e6;
        }
        
        .search-box {
            margin-top: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .schedule-display {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .schedule-header {
            margin-bottom: 20px;
        }
        
        .schedule-header h2 {
            color: #495057;
            font-size: 1.5em;
        }
        
        .schedule-container {
            flex: 1;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            overflow: auto;
            background: white;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 12px 15px;
            border: 1px solid #e9ecef;
            text-align: center;
        }
        
        .period-cell {
            background: #f8f9fa;
            font-weight: 600;
            color: #495057;
            width: 60px;
        }
        
        .course-cell {
            background: #f0f7ff;
            transition: all 0.2s ease;
        }
        
        .course-cell:hover {
            background: #e3f2fd;
            transform: scale(1.02);
        }
        
        .empty-cell {
            background: #f8f9fa;
        }
        
        .message-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }
        
        .no-data {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 20px;
        }
        
        .no-data-cell {
            text-align: center;
            color: #6c757d;
            font-style: italic;
            padding: 40px;
        }
        
        @media (max-width: 1200px) {
            .main-content {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                flex-direction: row;
            }
            
            .sidebar-section {
                flex: 1;
                min-height: 250px;
            }
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .sidebar {
                flex-direction: column;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 班级与教师课表查询系统</h1>
            <p>上传JSON文件或使用示例数据查看课表信息</p>
        </div>
        
        <div class="main-content">
            <!-- 左侧边栏 -->
            <div class="sidebar">
                <!-- 班级列表 -->
                <div class="sidebar-section">
                    <h2>🏫 班级列表</h2>
                    <div class="list-container">
                        <ul id="classesList">
                            <li class="no-data">请上传或选择课表数据</li>
                        </ul>
                    </div>
                </div>
                
                <!-- 教师列表 -->
                <div class="sidebar-section">
                    <h2>👨‍🏫 教师列表</h2>
                    <div class="list-container">
                        <ul id="teachersList">
                            <li class="no-data">请上传或选择课表数据</li>
                        </ul>
                    </div>
                </div>
                
                <!-- 搜索框 -->
                <div class="sidebar-section">
                    <h2>🔍 搜索</h2>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索班级或教师..." disabled>
                    </div>
                </div>
            </div>
            
            <!-- 主要内容区域 -->
            <div class="content-area">
                <!-- 控制区域 -->
                <div class="controls">
                    <div class="file-input-wrapper">
                        <button class="btn">
                            <span>📁 上传JSON文件</span>
                        </button>
                        <input type="file" id="fileInput" accept=".json">
                    </div>
                    
                    <button class="btn btn-secondary" id="resetSearch">
                        <span>🔄 重置搜索</span>
                    </button>
                </div>
                
                <!-- 示例数据区域 -->
                <div class="sample-data-section">
                    <h3>使用示例数据：</h3>
                    <div class="sample-buttons">
                        <button class="sample-data-btn" data-url="data/202409课表.json">2024年9月课表</button>
                        <button class="sample-data-btn" data-url="data/202410课表.json">2024年10月课表</button>
                        <button class="sample-data-btn" data-url="data/202411课表.json">2024年11月课表</button>
                    </div>
                </div>
                
                <!-- 课表显示区域 -->
                <div class="schedule-display">
                    <div class="schedule-header">
                        <h2 id="scheduleTitle">请选择班级或教师查看课表</h2>
                    </div>
                    
                    <div class="schedule-container">
                        <table id="scheduleTable">
                            <tr>
                                <td class="no-data-cell">未选择课表</td>
                            </tr>
                        </table>
                    </div>
                </div>
                
                <!-- 消息区域 -->
                <div class="message-area" id="message"></div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let allClasses = [];
        let allTeachers = [];
        let currentSchedule = null;
        let currentType = null;
        let allSchedules = null;

        // DOM元素
        let classesListElement = null;
        let teachersListElement = null;
        let scheduleTableElement = null;
        let scheduleTitleElement = null;
        let searchInputElement = null;
        let messageElement = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializeElements();
            initializeEventListeners();
        });

        // 初始化DOM元素
        function initializeElements() {
            classesListElement = document.getElementById('classesList');
            teachersListElement = document.getElementById('teachersList');
            scheduleTableElement = document.getElementById('scheduleTable');
            scheduleTitleElement = document.getElementById('scheduleTitle');
            searchInputElement = document.getElementById('searchInput');
            messageElement = document.getElementById('message');
        }

        // 初始化事件监听器
        function initializeEventListeners() {
            // 文件上传事件
            const fileInput = document.getElementById('fileInput');
            if (fileInput) {
                fileInput.addEventListener('change', handleFileUpload);
            }
            
            // 示例数据按钮事件
            const sampleDataButtons = document.querySelectorAll('.sample-data-btn');
            sampleDataButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const url = this.getAttribute('data-url');
                    loadData(url, this.textContent.trim());
                });
            });
            
            // 搜索框事件
            if (searchInputElement) {
                searchInputElement.addEventListener('input', handleSearch);
                searchInputElement.addEventListener('keyup', function(event) {
                    if (event.key === 'Enter') {
                        performSearch();
                    }
                });
            }
            
            // 重置搜索按钮
            const resetSearchButton = document.getElementById('resetSearch');
            if (resetSearchButton) {
                resetSearchButton.addEventListener('click', resetSearch);
            }
        }

        // 处理文件上传
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (!file.name.endsWith('.json')) {
                showError('请选择JSON文件');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    processJsonData(data, '', file.name);
                } catch (err) {
                    showError('解析JSON文件失败: ' + err.message);
                }
            };
            reader.onerror = function() {
                showError('读取文件失败');
            };
            reader.readAsText(file);
        }

        // 加载数据
        async function loadData(url, displayName = '') {
            try {
                showMessage('正在加载课表数据...', '#3498db');
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                processJsonData(data, url, displayName);
                
            } catch (err) {
                console.error('加载课表失败:', err);
                showError(`加载课表失败: ${err.message}`);
            }
        }

        // 处理JSON数据 - 修改后的核心函数
        function processJsonData(data, url, fileName) {
            try {
                let classes = [];
                let teachers = [];
                
                console.log('开始处理课表数据...');
                console.log('原始数据结构:', Object.keys(data));
                
                // 从单一字段中提取两种数据
                if (data.teachers) {
                    console.log('teachers字段存在，包含项目数:', Object.keys(data.teachers).length);
                    
                    // 从teachers字段中同时提取班级和教师数据
                    classes = extractClasses(data.teachers);
                    teachers = extractTeachers(data.teachers);
                    
                    console.log('提取到的班级数量:', classes.length, '班级列表:', classes.map(c => c.name));
                    console.log('提取到的教师数量:', teachers.length, '教师列表:', teachers.map(t => t.name));
                } else if (data.classes) {
                    // 如果有独立的classes字段，使用原有逻辑
                    classes = extractClassesFromSeparateField(data.classes);
                    if (data.teachers) {
                        teachers = extractTeachers(data.teachers);
                    }
                } else {
                    // 如果没有预期的字段，尝试直接从根对象提取
                    classes = extractClasses(data);
                    teachers = extractTeachers(data);
                }
                
                // 更新全局数据
                allClasses = classes;
                allTeachers = teachers;
                allSchedules = classes.concat(teachers);
                
                // 更新界面显示
                updateClassesList();
                updateTeachersList();
                
                // 如果加载了数据，显示第一个课表
                if (classes.length > 0) {
                    showSchedule(classes[0], 'class');
                } else if (teachers.length > 0) {
                    showSchedule(teachers[0], 'teacher');
                } else {
                    showError('未找到有效的课表数据');
                }
                
                // 更新标题
                if (scheduleTitleElement) {
                    const displayName = fileName || (url.includes('/') ? url.split('/').pop() : url);
                    scheduleTitleElement.textContent = `已加载: ${displayName}`;
                }
                
                // 显示加载成功的消息
                if (messageElement) {
                    const classCount = classes.length;
                    const teacherCount = teachers.length;
                    messageElement.textContent = `成功加载课表数据: ${classCount}个班级, ${teacherCount}位教师`;
                    messageElement.style.color = '#27ae60';
                    
                    setTimeout(() => {
                        messageElement.style.opacity = '0';
                        setTimeout(() => {
                            messageElement.textContent = '';
                            messageElement.style.opacity = '1';
                        }, 500);
                    }, 3000);
                }
                
                // 启用搜索框
                if (searchInputElement) {
                    searchInputElement.disabled = false;
                    searchInputElement.placeholder = '搜索班级或教师...';
                }
                
            } catch (err) {
                console.error('处理课表数据失败:', err);
                showError(`处理课表数据失败: ${err.message}`);
            }
        }

        // 从单独字段提取班级数据 - 兼容旧格式
        function extractClassesFromSeparateField(classesData) {
            const classes = [];
            
            if (classesData && typeof classesData === 'object') {
                Object.keys(classesData).forEach((className, index) => {
                    const classData = classesData[className];
                    
                    if (classData && classData.data) {
                        classes.push({
                            id: index,
                            name: classData.name || className,
                            description: classData.description || '',
                            rows: classData.rows || 0,
                            cols: classData.cols || 0,
                            data: classData.data || []
                        });
                    }
                });
            }
            
            // 按年级和班级排序
            classes.sort((a, b) => {
                const gradeA = extractGrade(a.name);
                const gradeB = extractGrade(b.name);
                const classNumA = extractClassNumber(a.name);
                const classNumB = extractClassNumber(b.name);
                
                if (gradeA !== gradeB) {
                    return gradeA - gradeB;
                }
                return classNumA - classNumB;
            });
            
            return classes;
        }

        // 修改后的extractClasses函数 - 从混合数据中筛选出班级课表
        function extractClasses(teachersData) {
            const classes = [];
            
            if (teachersData && typeof teachersData === 'object') {
                Object.keys(teachersData).forEach((key, index) => {
                    const item = teachersData[key];
                    
                    // 判断是否为班级课表：name字段包含数字，并且是班级格式
                    if (item && item.data && isClassName(item.name || key)) {
                        classes.push({
                            id: index,
                            name: item.name || key,
                            description: item.description || '',
                            rows: item.rows || 0,
                            cols: item.cols || 0,
                            data: item.data || []
                        });
                    }
                });
            }
            
            // 按年级和班级排序
            classes.sort((a, b) => {
                const gradeA = extractGrade(a.name);
                const gradeB = extractGrade(b.name);
                const classNumA = extractClassNumber(a.name);
                const classNumB = extractClassNumber(b.name);
                
                if (gradeA !== gradeB) {
                    return gradeA - gradeB;
                }
                return classNumA - classNumB;
            });
            
            return classes;
        }

        // 修改后的extractTeachers函数 - 从混合数据中筛选出教师课表
        function extractTeachers(teachersData) {
            const teachers = [];
            
            if (teachersData && typeof teachersData === 'object') {
                Object.keys(teachersData).forEach((key, index) => {
                    const item = teachersData[key];
                    
                    // 判断是否为教师课表：不包含班级特征
                    if (item && item.data && !isClassName(item.name || key)) {
                        teachers.push({
                            id: index,
                            name: item.name || key,
                            description: item.description || '',
                            rows: item.rows || 0,
                            cols: item.cols || 0,
                            data: item.data || []
                        });
                    }
                });
            }
            
            // 按姓名拼音排序
            teachers.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
            
            return teachers;
        }

        // 新增辅助函数：判断是否为班级名称
        function isClassName(name) {
            if (!name) return false;
            
            // 班级名称通常包含"班"字，并且包含数字
            const hasClassCharacter = name.includes('班');
            const hasNumbers = /\d/.test(name);
            
            return hasClassCharacter && hasNumbers;
        }

        // 辅助函数：提取年级数字
        function extractGrade(className) {
            if (!className) return 0;
            
            const match = className.match(/([初高一二三])/);
            if (!match) return 0;
            
            const gradeMap = {
                '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6,
                '七': 7, '八': 8, '九': 9, '十': 10
            };
            
            return gradeMap[match[1]] || 0;
        }

        // 辅助函数：提取班级编号
        function extractClassNumber(className) {
            if (!className) return 0;
            
            const match = className.match(/(\d+)/);
            return match ? parseInt(match[1], 10) : 0;
        }

        // 更新班级列表
        function updateClassesList() {
            if (!classesListElement) return;
            
            classesListElement.innerHTML = '';
            
            if (allClasses.length === 0) {
                const li = document.createElement('li');
                li.textContent = '无班级数据';
                li.className = 'no-data';
                classesListElement.appendChild(li);
                return;
            }
            
            allClasses.forEach((classData, index) => {
                const li = document.createElement('li');
                const button = document.createElement('button');
                button.textContent = `${classData.name}${classData.description ? ' - ' + classData.description : ''}`;
                button.className = 'list-item-btn';
                
                if (currentSchedule && currentSchedule.name === classData.name && currentType === 'class') {
                    button.classList.add('active');
                }
                
                button.addEventListener('click', () => {
                    showSchedule(classData, 'class');
                });
                
                li.appendChild(button);
                classesListElement.appendChild(li);
            });
        }

        // 更新教师列表
        function updateTeachersList() {
            if (!teachersListElement) return;
            
            teachersListElement.innerHTML = '';
            
            if (allTeachers.length === 0) {
                const li = document.createElement('li');
                li.textContent = '无教师数据';
                li.className = 'no-data';
                teachersListElement.appendChild(li);
                return;
            }
            
            allTeachers.forEach((teacher, index) => {
                const li = document.createElement('li');
                const button = document.createElement('button');
                button.textContent = `${teacher.name}${teacher.description ? ' - ' + teacher.description : ''}`;
                button.className = 'list-item-btn';
                
                if (currentSchedule && currentSchedule.name === teacher.name && currentType === 'teacher') {
                    button.classList.add('active');
                }
                
                button.addEventListener('click', () => {
                    showSchedule(teacher, 'teacher');
                });
                
                li.appendChild(button);
                teachersListElement.appendChild(li);
            });
        }

        // 显示课表
        function showSchedule(schedule, type) {
            if (!schedule || !scheduleTableElement || !scheduleTitleElement) return;
            
            currentSchedule = schedule;
            currentType = type;
            
            // 更新标题
            scheduleTitleElement.textContent = `${type === 'class' ? '班级' : '教师'}课表 - ${schedule.name}`;
            if (schedule.description) {
                scheduleTitleElement.textContent += ` (${schedule.description})`;
            }
            
            // 清空表格
            scheduleTableElement.innerHTML = '';
            
            // 创建表格
            if (!schedule.data || !Array.isArray(schedule.data) || schedule.data.length === 0) {
                const row = scheduleTableElement.insertRow();
                const cell = row.insertCell();
                cell.colSpan = schedule.cols || 6;
                cell.textContent = '无课表数据';
                cell.className = 'no-data-cell';
                return;
            }
            
            const data = schedule.data;
            
            // 创建表头
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            
            if (data[0] && Array.isArray(data[0])) {
                data[0].forEach((cell, colIndex) => {
                    const th = document.createElement('th');
                    th.innerHTML = cell;
                    headerRow.appendChild(th);
                });
            }
            
            thead.appendChild(headerRow);
            scheduleTableElement.appendChild(thead);
            
            // 创建表格主体
            const tbody = document.createElement('tbody');
            
            for (let i = 1; i < data.length; i++) {
                if (!Array.isArray(data[i])) continue;
                
                const row = document.createElement('tr');
                
                data[i].forEach((cell, colIndex) => {
                    const td = document.createElement('td');
                    td.innerHTML = cell;
                    
                    // 添加样式
                    if (colIndex === 0) {
                        td.className = 'period-cell';
                    } else if (cell && cell.trim() !== '') {
                        td.className = 'course-cell';
                    } else {
                        td.className = 'empty-cell';
                    }
                    
                    row.appendChild(td);
                });
                
                tbody.appendChild(row);
            }
            
            scheduleTableElement.appendChild(tbody);
            
            // 更新列表高亮
            updateClassesList();
            updateTeachersList();
        }

        // 搜索处理
        function handleSearch() {
            const searchTerm = searchInputElement.value.trim().toLowerCase();
            
            if (searchTerm === '') {
                resetSearch();
                return;
            }
            
            // 过滤班级
            const filteredClasses = allClasses.filter(classData => 
                classData.name.toLowerCase().includes(searchTerm) ||
                (classData.description && classData.description.toLowerCase().includes(searchTerm))
            );
            
            // 过滤教师
            const filteredTeachers = allTeachers.filter(teacher => 
                teacher.name.toLowerCase().includes(searchTerm) ||
                (teacher.description && teacher.description.toLowerCase().includes(searchTerm))
            );
            
            // 更新列表显示
            updateFilteredLists(filteredClasses, filteredTeachers);
        }

        // 执行搜索
        function performSearch() {
            handleSearch();
        }

        // 重置搜索
        function resetSearch() {
            if (searchInputElement) {
                searchInputElement.value = '';
            }
            updateClassesList();
            updateTeachersList();
        }

        // 更新过滤后的列表
        function updateFilteredLists(filteredClasses, filteredTeachers) {
            // 更新班级列表
            if (classesListElement) {
                classesListElement.innerHTML = '';
                
                if (filteredClasses.length === 0) {
                    const li = document.createElement('li');
                    li.textContent = '无匹配班级';
                    li.className = 'no-data';
                    classesListElement.appendChild(li);
                } else {
                    filteredClasses.forEach((classData, index) => {
                        const li = document.createElement('li');
                        const button = document.createElement('button');
                        button.textContent = `${classData.name}${classData.description ? ' - ' + classData.description : ''}`;
                        button.className = 'list-item-btn';
                        
                        if (currentSchedule && currentSchedule.name === classData.name && currentType === 'class') {
                            button.classList.add('active');
                        }
                        
                        button.addEventListener('click', () => {
                            showSchedule(classData, 'class');
                        });
                        
                        li.appendChild(button);
                        classesListElement.appendChild(li);
                    });
                }
            }
            
            // 更新教师列表
            if (teachersListElement) {
                teachersListElement.innerHTML = '';
                
                if (filteredTeachers.length === 0) {
                    const li = document.createElement('li');
                    li.textContent = '无匹配教师';
                    li.className = 'no-data';
                    teachersListElement.appendChild(li);
                } else {
                    filteredTeachers.forEach((teacher, index) => {
                        const li = document.createElement('li');
                        const button = document.createElement('button');
                        button.textContent = `${teacher.name}${teacher.description ? ' - ' + teacher.description : ''}`;
                        button.className = 'list-item-btn';
                        
                        if (currentSchedule && currentSchedule.name === teacher.name && currentType === 'teacher') {
                            button.classList.add('active');
                        }
                        
                        button.addEventListener('click', () => {
                            showSchedule(teacher, 'teacher');
                        });
                        
                        li.appendChild(button);
                        teachersListElement.appendChild(li);
                    });
                }
            }
        }

        // 显示消息
        function showMessage(text, color = '#3498db') {
            if (!messageElement) return;
            
            messageElement.textContent = text;
            messageElement.style.color = color;
            messageElement.style.opacity = '1';
        }

        // 显示错误
        function showError(text) {
            if (!messageElement) return;
            
            messageElement.textContent = text;
            messageElement.style.color = '#e74c3c';
            messageElement.style.opacity = '1';
            
            setTimeout(() => {
                messageElement.style.opacity = '0';
                setTimeout(() => {
                    messageElement.textContent = '';
                    messageElement.style.opacity = '1';
                }, 500);
            }, 5000);
        }
    </script>
</body>
</html>
