<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师课表查询系统 - 支持课程+班级显示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(90deg, #1a5f7a, #2a9d8f);
            color: white;
            padding: 20px 30px;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .control-panel {
            padding: 20px 30px;
            background: #f8fcfb;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .data-source-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .data-source-btn {
            display: flex;
            align-items: center;
            background: #2a9d8f;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .data-source-btn:hover {
            background: #1a5f7a;
        }
        
        .data-source-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #c8e6e1;
            border-radius: 6px;
            font-size: 1rem;
        }
        
        .content {
            display: flex;
            height: 650px;
        }
        
        .teacher-sidebar {
            width: 300px;
            background: #f8fcfb;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .teacher-list-header {
            padding: 15px;
            background: #1a5f7a;
            color: white;
            font-weight: bold;
        }
        
        .teacher-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .teacher-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .teacher-item:hover {
            background: #e8f6f3;
            transform: translateX(3px);
        }
        
        .teacher-item.active {
            background: #2a9d8f;
            color: white;
            border-color: #1a5f7a;
        }
        
        .teacher-item-name {
            font-weight: bold;
            font-size: 1rem;
        }
        
        .teacher-item-desc {
            font-size: 0.8rem;
            color: #666;
            margin-top: 3px;
        }
        
        .timetable-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .teacher-info-header {
            padding: 15px 20px;
            background: #e8f6f3;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .teacher-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #1a5f7a;
        }
        
        .teacher-desc {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        
        .timetable-container {
            flex: 1;
            overflow: auto;
            padding: 20px;
            background: #f9f9f9;
        }
        
        /* Excel风格表格样式 - 8行6列专用 */
        .excel-table-8x6 {
            width: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 2px solid #1a5f7a;
        }
        
        .excel-table-8x6 th {
            background: #1a5f7a;
            color: white;
            padding: 12px 15px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #2a9d8f;
            min-width: 100px;
        }
        
        .excel-table-8x6 td {
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            text-align: center;
            vertical-align: middle;
            min-width: 100px;
            height: 50px;
        }
        
        .excel-table-8x6 tr:nth-child(even) {
            background: #f9f9f9;
        }
        
        .excel-table-8x6 tr:hover {
            background: #f0f9f7;
        }
        
        .excel-table-8x6 .row-header {
            background: #2a9d8f;
            color: white;
            font-weight: bold;
            border: 1px solid #2a9d8f;
            min-width: 80px;
        }
        
        .excel-table-8x6 .corner-cell {
            background: #1a5f7a;
            color: white;
            font-weight: bold;
        }
        
        /* 课程班级单元格样式 */
        .course-cell {
            font-weight: 500;
            line-height: 1.4;
        }
        
        .course-cell .course-name {
            display: block;
            font-weight: bold;
            font-size: 0.95rem;
        }
        
        .course-cell .class-info {
            display: block;
            font-size: 0.8rem;
            color: #666;
            margin-top: 3px;
        }
        
        .course-cell.language { background: #e3f2fd; }
        .course-cell.math { background: #f3e5f5; }
        .course-cell.english { background: #e8f5e8; }
        .course-cell.physics { background: #fff3e0; }
        .course-cell.chemistry { background: #fce4ec; }
        .course-cell.sports { background: #e8eaf6; }
        .course-cell.music { background: #f3e5f5; }
        .course-cell.art { background: #e0f2f1; }
        .course-cell.history { background: #fff8e1; }
        .course-cell.geography { background: #f1f8e9; }
        .course-cell.self-study { background: #f5f5f5; }
        .course-cell.activity { background: #e8f5e8; }
        .course-cell.meeting { background: #e3f2fd; }
        .course-cell.experiment { background: #fce4ec; }
        .course-cell.tutoring { background: #f1f8e9; }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #2a9d8f;
            font-size: 1.2rem;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 6px;
            margin: 20px;
            border-left: 4px solid #c62828;
        }
        
        .no-data {
            text-align: center;
            padding: 50px 20px;
            color: #7f8c8d;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 10px 15px;
            border-radius: 6px;
            margin: 10px 0;
            border-left: 4px solid #28a745;
        }
        
        footer {
            padding: 15px 30px;
            background: #f8fcfb;
            border-top: 1px solid #e0e0e0;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.85rem;
        }
        
        .status-area {
            min-height: 60px;
        }
        
        .json-format-example {
            background: #f8fcfb;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-chalkboard-teacher"></i> 教师课表查询系统</h1>
            <p class="subtitle">支持课程+班级显示格式</p>
        </header>
        
        <div class="control-panel">
            <div class="data-source-area">
                <button class="data-source-btn" id="loadJsonBtn">
                    <i class="fas fa-file-code"></i> 加载JSON文件
                </button>
                <input type="text" class="data-source-input" id="customDataSource" 
                       placeholder="输入JSON文件URL (默认: 教师课表.json)" 
                       value="教师课表.json">
            </div>
            
            <div class="status-area">
                <div id="errorMessage" class="error" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                </div>
                
                <div id="successMessage" class="success" style="display: none;">
                    <i class="fas fa-check-circle"></i> <span id="successText"></span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="teacher-sidebar">
                <div class="teacher-list-header">
                    <i class="fas fa-list"></i> 教师列表 (<span id="teacherCountDisplay">0</span>)
                </div>
                <div class="teacher-list-container" id="teacherList">
                    <div class="no-data">请先加载数据源</div>
                </div>
            </div>
            
            <div class="timetable-main">
                <div class="teacher-info-header" id="teacherInfoHeader" style="display: none;">
                    <div class="teacher-name" id="currentTeacherName">未选择教师</div>
                    <div class="teacher-desc" id="currentTeacherDesc">请从左侧列表选择教师查看课表</div>
                </div>
                
                <div class="timetable-container" id="timetableContainer">
                    <div class="no-data" id="noDataMessage">
                        <i class="fas fa-calendar-alt fa-3x"></i>
                        <h3 style="margin: 15px 0 10px;">暂无课表数据</h3>
                        <p>请从左侧选择一位教师以查看详细的课表安排</p>
                    </div>
                    
                    <div class="loading" id="loadingIndicator" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i> 正在加载课表数据...
                    </div>
                    
                    <div id="timetableContent" style="display: none; overflow: auto;">
                        <table class="excel-table-8x6" id="timetableTable">
                            <thead id="tableHeader"></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="control-panel" style="border-top: 1px solid #e0e0e0; border-bottom: none;">
            <h3><i class="fas fa-info-circle"></i> JSON文件格式说明</h3>
            <p>为了让课程和班级在同一单元格显示，JSON格式支持两种形式：</p>
            
            <div class="json-format-example">
格式1: 字符串形式 (简单)
"语文<br>高一一班"

格式2: 对象形式 (推荐)
{
  "course": "语文",
  "class": "高一一班"
}
            </div>
            
            <p>支持8行6列的Excel格式，第一行表头，第一列行标题</p>
        </div>
        
        <footer>
            <p>© 2023 教师课表查询系统 | 支持课程+班级显示格式</p>
        </footer>
    </div>

    <script>
        // DOM元素
        const loadJsonBtn = document.getElementById('loadJsonBtn');
        const customDataSource = document.getElementById('customDataSource');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const teacherCountDisplay = document.getElementById('teacherCountDisplay');
        const teacherList = document.getElementById('teacherList');
        const teacherInfoHeader = document.getElementById('teacherInfoHeader');
        const currentTeacherName = document.getElementById('currentTeacherName');
        const currentTeacherDesc = document.getElementById('currentTeacherDesc');
        const noDataMessage = document.getElementById('noDataMessage');
        const timetableContent = document.getElementById('timetableContent');
        const timetableTable = document.getElementById('timetableTable');
        const tableHeader = document.getElementById('tableHeader');
        const tableBody = document.getElementById('tableBody');
        
        // 全局变量
        let jsonData = null;
        let teachers = [];
        let currentTeacherIndex = -1;
        
        // 课程颜色映射
        const courseColors = {
            '语文': 'language',
            '数学': 'math',
            '英语': 'english',
            '物理': 'physics',
            '化学': 'chemistry',
            '体育': 'sports',
            '音乐': 'music',
            '美术': 'art',
            '历史': 'history',
            '地理': 'geography',
            '自习': 'self-study',
            '活动': 'activity',
            '班会': 'meeting',
            '实验': 'experiment',
            '作业辅导': 'tutoring',
            '社团活动': 'activity'
        };
        
        // 初始化事件监听器
        function initEventListeners() {
            loadJsonBtn.addEventListener('click', () => {
                const url = customDataSource.value.trim() || '教师课表.json';
                loadData(url);
            });
            
            customDataSource.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const url = customDataSource.value.trim();
                    loadData(url);
                }
            });
        }
        
        // 加载数据
        async function loadData(url) {
            resetUI();
            showLoading();
            hideError();
            hideSuccess();
            
            try {
                console.log('开始加载JSON文件:', url);
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                console.log('响应状态:', response.status);
                
                const data = await response.json();
                console.log('成功解析JSON数据:', data);
                
                processJsonData(data, url);
                
            } catch (err) {
                console.error('加载JSON失败:', err);
                showError(`加载JSON失败: ${err.message}`);
            } finally {
                hideLoading();
            }
        }
        
        // 处理JSON数据
        function processJsonData(data, url) {
            try {
                console.log('开始处理JSON数据...');
                
                // 检查数据格式
                if (!data || typeof data !== 'object') {
                    throw new Error('JSON数据格式不正确');
                }
                
                // 提取教师数据
                if (!data.teachers) {
                    throw new Error('JSON数据中缺少teachers字段');
                }
                
                teachers = extractTeachers(data);
                
                if (teachers.length === 0) {
                    showError('JSON数据中没有找到有效的教师信息');
                    return;
                }
                
                jsonData = data;
                teacherCountDisplay.textContent = teachers.length;
                
                displayTeacherList(teachers);
                
                showSuccess(`成功加载 ${teachers.length} 位教师的数据`);
                
            } catch (err) {
                console.error('处理JSON数据失败:', err);
                showError(`处理JSON数据失败: ${err.message}`);
            }
        }
        
        // 提取教师列表
        function extractTeachers(data) {
            const teachers = [];
            
            console.log('提取教师数据，teachers对象:', data.teachers);
            
            if (data.teachers && typeof data.teachers === 'object') {
                Object.keys(data.teachers).forEach((teacherKey, index) => {
                    const teacherData = data.teachers[teacherKey];
                    console.log(`处理教师 ${teacherKey}:`, teacherData);
                    
                    if (teacherData && teacherData.data) {
                        teachers.push({
                            id: index,
                            name: teacherData.name || teacherKey,
                            description: teacherData.description || '',
                            rows: teacherData.rows || 0,
                            cols: teacherData.cols || 0,
                            data: teacherData.data || []
                        });
                    }
                });
            }
            
            console.log('提取到的教师数量:', teachers.length);
            return teachers;
        }
        
        // 显示教师列表
        function displayTeacherList(teachers) {
            teacherList.innerHTML = '';
            
            if (teachers.length === 0) {
                teacherList.innerHTML = '<div class="no-data">未找到教师数据</div>';
                return;
            }
            
            teachers.forEach(teacher => {
                const teacherItem = document.createElement('div');
                teacherItem.className = 'teacher-item';
                teacherItem.dataset.id = teacher.id;
                teacherItem.innerHTML = `
                    <div class="teacher-item-name">${teacher.name}</div>
                    ${teacher.description ? 
                      `<div class="teacher-item-desc">${teacher.description}</div>` : ''}
                `;
                
                teacherItem.addEventListener('click', () => {
                    selectTeacher(teacher.id);
                });
                
                teacherList.appendChild(teacherItem);
            });
            
            // 默认选择第一个教师
            if (teachers.length > 0) {
                selectTeacher(0);
            }
        }
        
        // 选择教师
        function selectTeacher(teacherId) {
            const teacher = teachers.find(t => t.id === teacherId);
            if (!teacher) return;
            
            // 更新教师选择状态
            document.querySelectorAll('.teacher-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`.teacher-item[data-id="${teacherId}"]`).classList.add('active');
            
            // 显示教师信息
            currentTeacherName.textContent = teacher.name;
            currentTeacherDesc.textContent = teacher.description || `${teacher.rows}行 × ${teacher.cols}列`;
            currentTeacherIndex = teacherId;
            
            // 显示课表
            showTeacherTimetable(teacher);
        }
        
        // 显示教师课表
        function showTeacherTimetable(teacher) {
            noDataMessage.style.display = 'none';
            loadingIndicator.style.display = 'flex';
            timetableContent.style.display = 'none';
            teacherInfoHeader.style.display = 'block';
            
            setTimeout(() => {
                try {
                    const timetableData = teacher.data;
                    
                    if (!timetableData || !Array.isArray(timetableData) || timetableData.length === 0) {
                        currentTeacherDesc.textContent = '该教师没有可用的课表数据';
                        loadingIndicator.style.display = 'none';
                        noDataMessage.style.display = 'block';
                        return;
                    }
                    
                    // 显示Excel风格的课表
                    displayExcelTimetable(timetableData);
                    
                    loadingIndicator.style.display = 'none';
                    timetableContent.style.display = 'block';
                    
                } catch (err) {
                    console.error('显示课表失败:', err);
                    showError(`显示课表失败: ${err.message}`);
                    loadingIndicator.style.display = 'none';
                }
            }, 100);
        }
        
        // 显示Excel风格的课表
        function displayExcelTimetable(data) {
            if (!data || data.length === 0) {
                tableHeader.innerHTML = '';
                tableBody.innerHTML = '';
                return;
            }
            
            // 生成表头
            let headerHTML = '<tr>';
            
            // 第一行是表头
            for (let col = 0; col < data[0].length; col++) {
                const cellValue = data[0][col] || '';
                const cellClass = col === 0 ? 'corner-cell' : '';
                headerHTML += `<th class="${cellClass}">${cellValue}</th>`;
            }
            headerHTML += '</tr>';
            tableHeader.innerHTML = headerHTML;
            
            // 生成表格行（从第二行开始）
            let bodyHTML = '';
            for (let row = 1; row < data.length; row++) {
                const rowData = data[row];
                
                bodyHTML += '<tr>';
                
                for (let col = 0; col < rowData.length; col++) {
                    const cellValue = rowData[col] !== undefined ? rowData[col] : '';
                    const cellDisplay = formatCellValue(cellValue);
                    
                    let cellClass = '';
                    let cellContent = cellDisplay;
                    
                    if (col === 0) {
                        // 行标题单元格
                        cellClass = 'row-header';
                    } else if (cellValue) {
                        // 课程单元格
                        cellClass = 'course-cell';
                        
                        // 根据课程内容添加颜色类
                        for (const [keyword, colorClass] of Object.entries(courseColors)) {
                            if (cellDisplay.includes(keyword)) {
                                cellClass += ' ' + colorClass;
                                break;
                            }
                        }
                    }
                    
                    bodyHTML += `<td class="${cellClass}">${cellContent}</td>`;
                }
                
                bodyHTML += '</tr>';
            }
            tableBody.innerHTML = bodyHTML;
        }
        
        // 格式化单元格值 - 支持课程+班级格式
        function formatCellValue(value) {
            if (value === null || value === undefined) {
                return '';
            }
            
            // 如果值是对象形式 {course: "课程", class: "班级"}
            if (typeof value === 'object' && value !== null) {
                if (value.course) {
                    let html = `<span class="course-name">${value.course}</span>`;
                    if (value.class) {
                        html += `<span class="class-info">${value.class}</span>`;
                    }
                    return html;
                }
                return JSON.stringify(value);
            }
            
            // 如果值是字符串，检查是否包含<br>标签
            if (typeof value === 'string') {
                if (value.includes('<br>')) {
                    const parts = value.split('<br>');
                    if (parts.length >= 2) {
                        return `<span class="course-name">${parts[0]}</span><span class="class-info">${parts[1]}</span>`;
                    }
                }
                
                // 如果是"课程/班级"格式
                if (value.includes('/')) {
                    const parts = value.split('/');
                    if (parts.length >= 2) {
                        return `<span class="course-name">${parts[0]}</span><span class="class-info">${parts[1]}</span>`;
                    }
                }
            }
            
            return String(value);
        }
        
        // 显示加载
        function showLoading() {
            loadingIndicator.style.display = 'flex';
        }
        
        // 隐藏加载
        function hideLoading() {
            loadingIndicator.style.display = 'none';
        }
        
        // 显示错误
        function showError(message) {
            errorText.textContent = message;
            errorMessage.style.display = 'block';
        }
        
        // 隐藏错误
        function hideError() {
            errorMessage.style.display = 'none';
        }
        
        // 显示成功
        function showSuccess(message) {
            successText.textContent = message;
            successMessage.style.display = 'block';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);
        }
        
        // 隐藏成功
        function hideSuccess() {
            successMessage.style.display = 'none';
        }
        
        // 重置UI
        function resetUI() {
            jsonData = null;
            teachers = [];
            currentTeacherIndex = -1;
            
            teacherInfoHeader.style.display = 'none';
            timetableContent.style.display = 'none';
            noDataMessage.style.display = 'block';
            teacherList.innerHTML = '<div class="no-data">请先加载数据源</div>';
            teacherCountDisplay.textContent = '0';
            
            hideError();
            hideSuccess();
        }
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成，初始化事件监听器...');
            initEventListeners();
            
            // 自动尝试加载默认JSON文件
            setTimeout(() => {
                console.log('尝试自动加载JSON文件...');
                if (window.location.href.indexOf('file://') === -1) {
                    loadJsonBtn.click();
                } else {
                    console.log('本地文件模式，不自动加载');
                }
            }, 500);
        });
    </script>
</body>
</html>
