<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师课表查询系统 - Excel风格界面</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(90deg, #1a5f7a, #2a9d8f);
            color: white;
            padding: 20px 30px;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .control-panel {
            padding: 20px 30px;
            background: #f8fcfb;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .data-source-area {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .data-source-btn {
            display: flex;
            align-items: center;
            background: #2a9d8f;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .data-source-btn:hover {
            background: #1a5f7a;
        }
        
        .data-source-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #c8e6e1;
            border-radius: 6px;
        }
        
        .file-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .file-info-item {
            background: #e8f6f3;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        
        .content {
            display: flex;
            height: 600px;
        }
        
        .teacher-sidebar {
            width: 300px;
            background: #f8fcfb;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .teacher-list-header {
            padding: 15px;
            background: #1a5f7a;
            color: white;
            font-weight: bold;
        }
        
        .teacher-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .teacher-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .teacher-item:hover {
            background: #e8f6f3;
            transform: translateX(3px);
        }
        
        .teacher-item.active {
            background: #2a9d8f;
            color: white;
            border-color: #1a5f7a;
        }
        
        .timetable-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .teacher-info-header {
            padding: 15px 20px;
            background: #e8f6f3;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .teacher-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #1a5f7a;
        }
        
        .teacher-stats {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        
        .timetable-container {
            flex: 1;
            overflow: auto;
            padding: 20px;
            background: #f9f9f9;
        }
        
        /* Excel风格表格样式 */
        .excel-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .excel-table th {
            background: #1a5f7a;
            color: white;
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #2a9d8f;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .excel-table td {
            padding: 10px 8px;
            border: 1px solid #e0e0e0;
            text-align: center;
            vertical-align: middle;
            min-width: 100px;
        }
        
        .excel-table tr:nth-child(even) {
            background: #f9f9f9;
        }
        
        .excel-table tr:hover {
            background: #f0f9f7;
        }
        
        .row-header {
            background: #2a9d8f;
            color: white;
            font-weight: bold;
            border: 1px solid #2a9d8f;
            position: sticky;
            left: 0;
            z-index: 5;
        }
        
        .corner-cell {
            background: #1a5f7a;
            color: white;
            position: sticky;
            top: 0;
            left: 0;
            z-index: 20;
        }
        
        .table-wrapper {
            position: relative;
        }
        
        .scroll-overlay {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            pointer-events: none;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #2a9d8f;
            font-size: 1.2rem;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 6px;
            margin: 20px;
            border-left: 4px solid #c62828;
        }
        
        .no-data {
            text-align: center;
            padding: 50px 20px;
            color: #7f8c8d;
        }
        
        .progress-bar {
            height: 3px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1a5f7a, #2a9d8f);
            width: 0%;
            transition: width 0.3s;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px 15px;
            border-radius: 6px;
            margin: 10px 0;
            border-left: 4px solid #28a745;
        }
        
        .data-format-hint {
            background: #fff3cd;
            color: #856404;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        
        footer {
            padding: 15px 30px;
            background: #f8fcfb;
            border-top: 1px solid #e0e0e0;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-chalkboard-teacher"></i> 教师课表查询系统</h1>
            <p class="subtitle">Excel风格界面，完美显示教师课表</p>
        </header>
        
        <div class="control-panel">
            <div class="data-source-area">
                <button class="data-source-btn" id="loadJsonBtn">
                    <i class="fas fa-file-code"></i> 加载JSON
                </button>
                <button class="data-source-btn" id="loadJsonGzBtn">
                    <i class="fas fa-file-archive"></i> 加载JSON.GZ
                </button>
                <input type="text" class="data-source-input" id="customDataSource" 
                       placeholder="输入数据源URL (默认: 教师课表.json)" 
                       value="教师课表.json">
            </div>
            
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="file-info" id="fileInfo" style="display: none;">
                <div class="file-info-item"><i class="fas fa-file"></i> 文件: <span id="fileName">-</span></div>
                <div class="file-info-item"><i class="fas fa-weight-hanging"></i> 大小: <span id="fileSize">-</span></div>
                <div class="file-info-item"><i class="fas fa-users"></i> 教师数: <span id="teacherCount">0</span></div>
                <div class="file-info-item"><i class="fas fa-clock"></i> 时间: <span id="loadTime">-</span></div>
            </div>
            
            <div id="errorMessage" class="error" style="display: none;">
                <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
            </div>
            
            <div id="successMessage" class="success-message" style="display: none;">
                <i class="fas fa-check-circle"></i> <span id="successText"></span>
            </div>
            
            <div class="data-format-hint" id="dataFormatHint" style="display: none;">
                <strong>提示：</strong> 检测到JSON数据结构，正在分析教师列表...
            </div>
        </div>
        
        <div class="content">
            <div class="teacher-sidebar">
                <div class="teacher-list-header">
                    <i class="fas fa-list"></i> 教师列表 (<span id="teacherCountDisplay">0</span>)
                </div>
                <div class="teacher-list-container" id="teacherList">
                    <div class="no-data">请先加载数据源</div>
                </div>
            </div>
            
            <div class="timetable-main">
                <div class="teacher-info-header" id="teacherInfoHeader" style="display: none;">
                    <div class="teacher-name" id="currentTeacherName">未选择教师</div>
                    <div class="teacher-stats" id="currentTeacherStats">请从左侧列表选择教师查看课表</div>
                </div>
                
                <div class="timetable-container" id="timetableContainer">
                    <div class="no-data" id="noDataMessage">
                        <i class="fas fa-calendar-alt fa-3x"></i>
                        <h3 style="margin: 15px 0 10px;">暂无课表数据</h3>
                        <p>请从左侧选择一位教师以查看详细的课表安排</p>
                    </div>
                    
                    <div class="loading" id="loadingIndicator" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i> 正在加载课表数据...
                    </div>
                    
                    <div id="timetableContent" style="display: none;">
                        <div class="table-wrapper">
                            <table class="excel-table" id="timetableTable">
                                <thead id="tableHeader"></thead>
                                <tbody id="tableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>© 2023 教师课表查询系统 | Excel风格界面，完美显示教师课表数据</p>
        </footer>
    </div>

    <script>
        // DOM元素
        const loadJsonBtn = document.getElementById('loadJsonBtn');
        const loadJsonGzBtn = document.getElementById('loadJsonGzBtn');
        const customDataSource = document.getElementById('customDataSource');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const teacherCount = document.getElementById('teacherCount');
        const teacherCountDisplay = document.getElementById('teacherCountDisplay');
        const loadTime = document.getElementById('loadTime');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const dataFormatHint = document.getElementById('dataFormatHint');
        const teacherList = document.getElementById('teacherList');
        const teacherInfoHeader = document.getElementById('teacherInfoHeader');
        const currentTeacherName = document.getElementById('currentTeacherName');
        const currentTeacherStats = document.getElementById('currentTeacherStats');
        const noDataMessage = document.getElementById('noDataMessage');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const timetableContent = document.getElementById('timetableContent');
        const timetableTable = document.getElementById('timetableTable');
        const tableHeader = document.getElementById('tableHeader');
        const tableBody = document.getElementById('tableBody');
        
        // 全局变量
        let jsonData = null;
        let teachers = [];
        let currentTeacherIndex = -1;
        
        // 初始化事件监听器
        function initEventListeners() {
            loadJsonBtn.addEventListener('click', () => {
                const url = customDataSource.value.trim() || '教师课表.json';
                loadData(url, 'json');
            });
            
            loadJsonGzBtn.addEventListener('click', () => {
                let url = customDataSource.value.trim() || '教师课表.json';
                if (!url.endsWith('.gz')) {
                    url = url + '.gz';
                }
                loadData(url, 'json.gz');
            });
            
            customDataSource.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const url = customDataSource.value.trim();
                    if (url.endsWith('.gz')) {
                        loadData(url, 'json.gz');
                    } else {
                        loadData(url, 'json');
                    }
                }
            });
        }
        
        // 加载数据
        async function loadData(url, type) {
            resetUI();
            showLoading();
            hideError();
            hideSuccess();
            
            const startTime = performance.now();
            
            try {
                updateProgress(20);
                
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const contentLength = response.headers.get('content-length');
                const actualSize = contentLength ? parseInt(contentLength) : null;
                
                updateProgress(50);
                
                let jsonDataObj;
                
                if (type === 'json.gz') {
                    const arrayBuffer = await response.arrayBuffer();
                    updateProgress(70);
                    const decompressed = pako.inflate(arrayBuffer, { to: 'string' });
                    updateProgress(85);
                    jsonDataObj = JSON.parse(decompressed);
                } else {
                    const text = await response.text();
                    updateProgress(85);
                    jsonDataObj = JSON.parse(text);
                }
                
                const endTime = performance.now();
                const loadDuration = (endTime - startTime).toFixed(0);
                
                updateProgress(100);
                
                processJsonData(jsonDataObj, url, type, actualSize, loadDuration);
                
                setTimeout(() => {
                    hideLoading();
                }, 300);
                
            } catch (err) {
                showError(`加载失败: ${err.message}`);
                hideLoading();
            }
        }
        
        // 处理JSON数据
        function processJsonData(data, url, type, actualSize, loadDuration) {
            try {
                updateFileInfo(url, type, actualSize, loadDuration);
                
                dataFormatHint.style.display = 'block';
                
                teachers = extractTeachers(data);
                
                if (teachers.length === 0) {
                    showError('未找到教师数据。请确认JSON格式是否正确。');
                    dataFormatHint.style.display = 'none';
                    return;
                }
                
                jsonData = data;
                teacherCount.textContent = teachers.length;
                teacherCountDisplay.textContent = teachers.length;
                
                displayTeacherList(teachers);
                dataFormatHint.style.display = 'none';
                
                showSuccess(`成功加载 ${teachers.length} 位教师的数据`);
                
            } catch (err) {
                showError(`处理数据失败: ${err.message}`);
            }
        }
        
        // 提取教师列表
        function extractTeachers(data) {
            const teachers = [];
            
            // 1. 尝试标准结构: {teachers: {teacher1: {data: [...]}, teacher2: {data: [...]}}}
            if (data.teachers && typeof data.teachers === 'object') {
                Object.keys(data.teachers).forEach((name, index) => {
                    const teacherData = data.teachers[name];
                    teachers.push({
                        id: index,
                        name: name,
                        data: teacherData.data || teacherData.timetable || teacherData.schedule || teacherData,
                        meta: {
                            rows: teacherData.rows,
                            cols: teacherData.cols,
                            ...teacherData
                        }
                    });
                });
            }
            
            // 2. 尝试直接结构: {teacher1: [...], teacher2: [...]}
            else if (typeof data === 'object' && !Array.isArray(data) && teachers.length === 0) {
                Object.keys(data).forEach((name, index) => {
                    const teacherData = data[name];
                    if (teacherData && (Array.isArray(teacherData) || 
                        (teacherData.data && Array.isArray(teacherData.data)))) {
                        teachers.push({
                            id: index,
                            name: name,
                            data: Array.isArray(teacherData) ? teacherData : teacherData.data,
                            meta: {
                                rows: teacherData.rows,
                                cols: teacherData.cols
                            }
                        });
                    }
                });
            }
            
            // 3. 尝试数组结构: [{name: "teacher1", data: [...]}, {name: "teacher2", data: [...]}]
            else if (Array.isArray(data) && teachers.length === 0) {
                data.forEach((item, index) => {
                    if (item.name || item.teacher) {
                        teachers.push({
                            id: index,
                            name: item.name || item.teacher,
                            data: item.data || item.timetable || item.schedule,
                            meta: {
                                rows: item.rows,
                                cols: item.cols
                            }
                        });
                    }
                });
            }
            
            return teachers;
        }
        
        // 显示教师列表
        function displayTeacherList(teachers) {
            teacherList.innerHTML = '';
            
            if (teachers.length === 0) {
                teacherList.innerHTML = '<div class="no-data">未找到教师数据</div>';
                return;
            }
            
            teachers.forEach(teacher => {
                const teacherItem = document.createElement('div');
                teacherItem.className = 'teacher-item';
                teacherItem.dataset.id = teacher.id;
                teacherItem.innerHTML = `
                    <div style="font-weight: bold;">${teacher.name}</div>
                    ${teacher.meta && teacher.meta.rows ? 
                      `<div style="font-size: 0.8rem; color: #666; margin-top: 3px;">
                         ${teacher.meta.rows}行 × ${teacher.meta.cols || '?'}列
                       </div>` : ''}
                `;
                
                teacherItem.addEventListener('click', () => {
                    selectTeacher(teacher.id);
                });
                
                teacherList.appendChild(teacherItem);
            });
        }
        
        // 选择教师
        function selectTeacher(teacherId) {
            const teacher = teachers.find(t => t.id === teacherId);
            if (!teacher) return;
            
            // 更新教师选择状态
            document.querySelectorAll('.teacher-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`.teacher-item[data-id="${teacherId}"]`).classList.add('active');
            
            // 显示教师信息
            currentTeacherName.textContent = teacher.name;
            currentTeacherIndex = teacherId;
            
            // 显示课表
            showTeacherTimetable(teacher);
        }
        
        // 显示教师课表
        function showTeacherTimetable(teacher) {
            noDataMessage.style.display = 'none';
            loadingIndicator.style.display = 'flex';
            timetableContent.style.display = 'none';
            teacherInfoHeader.style.display = 'block';
            
            setTimeout(() => {
                try {
                    let timetableData = [];
                    
                    // 获取课表数据
                    if (Array.isArray(teacher.data)) {
                        timetableData = teacher.data;
                    } else if (teacher.data && Array.isArray(teacher.data.data)) {
                        timetableData = teacher.data.data;
                    } else if (typeof teacher.data === 'object') {
                        // 尝试从对象中提取数组
                        for (const key in teacher.data) {
                            if (Array.isArray(teacher.data[key])) {
                                timetableData = teacher.data[key];
                                break;
                            }
                        }
                    }
                    
                    if (timetableData.length === 0) {
                        currentTeacherStats.textContent = '该教师没有可用的课表数据';
                        loadingIndicator.style.display = 'none';
                        noDataMessage.style.display = 'block';
                        return;
                    }
                    
                    const rows = timetableData.length;
                    const cols = rows > 0 ? 
                        Math.max(...timetableData.map(row => Array.isArray(row) ? row.length : 1)) : 0;
                    
                    currentTeacherStats.textContent = `${rows}行 × ${cols}列`;
                    
                    // 显示Excel风格的课表
                    displayExcelTimetable(timetableData);
                    
                    loadingIndicator.style.display = 'none';
                    timetableContent.style.display = 'block';
                    
                } catch (err) {
                    showError(`显示课表失败: ${err.message}`);
                    loadingIndicator.style.display = 'none';
                }
            }, 100);
        }
        
        // 显示Excel风格的课表
        function displayExcelTimetable(data) {
            if (!data || data.length === 0) {
                tableHeader.innerHTML = '';
                tableBody.innerHTML = '';
                return;
            }
            
            // 获取最大列数
            const maxCols = Math.max(...data.map(row => Array.isArray(row) ? row.length : 1));
            
            // 生成表头
            let headerHTML = '<tr>';
            headerHTML += '<th class="corner-cell">#</th>'; // 左上角单元格
            
            for (let col = 0; col < maxCols; col++) {
                headerHTML += `<th>${getColumnName(col)}</th>`;
            }
            headerHTML += '</tr>';
            tableHeader.innerHTML = headerHTML;
            
            // 生成表格行
            let bodyHTML = '';
            for (let row = 0; row < data.length; row++) {
                const rowData = data[row];
                const isRowArray = Array.isArray(rowData);
                
                bodyHTML += '<tr>';
                bodyHTML += `<td class="row-header">${row + 1}</td>`;
                
                for (let col = 0; col < maxCols; col++) {
                    let cellValue = '';
                    if (isRowArray) {
                        cellValue = rowData[col] !== undefined ? rowData[col] : '';
                    } else if (col === 0) {
                        cellValue = rowData;
                    }
                    
                    const cellDisplay = formatCellValue(cellValue);
                    const cellClass = getCellClass(cellValue, row, col);
                    
                    bodyHTML += `<td class="${cellClass}">${cellDisplay}</td>`;
                }
                
                bodyHTML += '</tr>';
            }
            tableBody.innerHTML = bodyHTML;
        }
        
        // 获取列名（Excel风格：A, B, C, ..., Z, AA, AB, ...）
        function getColumnName(colIndex) {
            let result = '';
            let index = colIndex;
            
            do {
                result = String.fromCharCode(65 + (index % 26)) + result;
                index = Math.floor(index / 26) - 1;
            } while (index >= 0);
            
            return result;
        }
        
        // 格式化单元格值
        function formatCellValue(value) {
            if (value === null || value === undefined || value === '') {
                return '';
            }
            
            // 如果是日期
            if (typeof value === 'string' && value.match(/^\d{4}-\d{2}-\d{2}/)) {
                return value;
            }
            
            // 如果是数字
            if (typeof value === 'number') {
                // 如果是整数
                if (Number.isInteger(value)) {
                    return value.toString();
                }
                // 如果是小数
                const formatted = value.toFixed(2);
                return formatted.replace(/\.00$/, '');
            }
            
            // 默认返回字符串
            return String(value);
        }
        
        // 获取单元格类名
        function getCellClass(value, row, col) {
            const classes = [];
            
            // 第一行作为表头
            if (row === 0) {
                classes.push('header-cell');
            }
            
            // 第一列作为行头
            if (col === 0) {
                classes.push('row-header-cell');
            }
            
            // 空单元格
            if (!value && value !== 0) {
                classes.push('empty-cell');
            }
            
            // 数字单元格
            if (typeof value === 'number') {
                classes.push('number-cell');
            }
            
            return classes.join(' ');
        }
        
        // 更新文件信息
        function updateFileInfo(url, type, actualSize, loadDuration) {
            const filename = url.split('/').pop();
            fileName.textContent = filename;
            
            let size = actualSize;
            if (size) {
                if (size < 1024) {
                    fileSize.textContent = `${size} B`;
                } else if (size < 1024 * 1024) {
                    fileSize.textContent = `${(size / 1024).toFixed(1)} KB`;
                } else {
                    fileSize.textContent = `${(size / (1024 * 1024)).toFixed(2)} MB`;
                }
            } else {
                fileSize.textContent = '-';
            }
            
            loadTime.textContent = `${loadDuration}ms`;
            fileInfo.style.display = 'grid';
        }
        
        // 更新进度
        function updateProgress(percent) {
            progressFill.style.width = `${percent}%`;
        }
        
        // 显示加载
        function showLoading() {
            progressBar.style.display = 'block';
            loadingIndicator.style.display = 'flex';
        }
        
        // 隐藏加载
        function hideLoading() {
            loadingIndicator.style.display = 'none';
            setTimeout(() => {
                progressBar.style.display = 'none';
                progressFill.style.width = '0%';
            }, 300);
        }
        
        // 显示错误
        function showError(message) {
            errorText.textContent = message;
            errorMessage.style.display = 'block';
        }
        
        // 隐藏错误
        function hideError() {
            errorMessage.style.display = 'none';
        }
        
        // 显示成功
        function showSuccess(message) {
            successText.textContent = message;
            successMessage.style.display = 'block';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);
        }
        
        // 隐藏成功
        function hideSuccess() {
            successMessage.style.display = 'none';
        }
        
        // 重置UI
        function resetUI() {
            jsonData = null;
            teachers = [];
            currentTeacherIndex = -1;
            
            fileInfo.style.display = 'none';
            teacherInfoHeader.style.display = 'none';
            timetableContent.style.display = 'none';
            noDataMessage.style.display = 'block';
            teacherList.innerHTML = '<div class="no-data">请先加载数据源</div>';
            teacherCountDisplay.textContent = '0';
            
            hideError();
            hideSuccess();
        }
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            initEventListeners();
            
            // 自动尝试加载默认JSON文件
            setTimeout(() => {
                if (window.location.href.indexOf('file://') === -1) {
                    loadJsonBtn.click();
                }
            }, 500);
        });
    </script>
</body>
</html>
